<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solo Leveling Fitness HUD</title>
    <meta name="theme-color" content="#020617">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Solo Leveling HUD">
    <link id="pwa-manifest-link" rel="manifest">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Configure Babel Standalone dynamically to use classic runtime cleanly -->
    <script>
        Babel.registerPreset('react-classic', {
            presets: [
                [Babel.availablePresets['react'], { runtime: 'classic' }]
            ]
        });
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Rajdhani:wght@500;600;700&display=swap');

        /* ============================================================
           DESIGN TOKENS — Motion Profile: BOLD/KINETIC
           (gamified RPG interface: longer, expressive motion is earned
           on reward moments; UI-state feedback stays fast & precise)
        ============================================================ */
        :root {
            --motion-fast: 130ms;      /* hover, focus, active, toggle */
            --motion-base: 260ms;      /* modal/tab enter-exit */
            --motion-slow: 420ms;      /* reward moments: level up, dungeon clear */
            --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
            --ease-out: cubic-bezier(0, 0, 0.2, 1);
            --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1); /* reward-only */

            --radius-sm: 6px;   /* chips, badges */
            --radius-md: 10px;  /* buttons, inputs */
            --radius-lg: 14px;  /* cards */
            --radius-xl: 18px;  /* panels, modals */

            --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
            --space-6: 24px; --space-8: 32px; --space-12: 48px;
        }

        /* State-feedback transitions (hover/focus/active) use the fast token by default */
        button, a, input, .transition-all {
            transition-duration: var(--motion-fast);
            transition-timing-function: var(--ease-standard);
        }

        /* Clear, on-brand keyboard focus (accessibility) — replaces invisible default outline */
        button:focus-visible, a:focus-visible, input:focus-visible, [tabindex]:focus-visible {
            outline: 2px solid #22d3ee;
            outline-offset: 2px;
            border-radius: var(--radius-sm);
        }
        input:focus-visible { outline-offset: 0; }

        /* Respect user preference: disable non-essential motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
                scroll-behavior: auto !important;
            }
        }

        .font-hud {
            font-family: 'Orbitron', sans-serif;
        }
        .font-sub {
            font-family: 'Rajdhani', sans-serif;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #020617;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e3a8a;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3b82f6;
        }
        /* Hide scrollbars for neat mobile tabs but keep scroll functionality */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Animated Scanline for HUD */
        .scanline {
            width: 100%;
            height: 100px;
            background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(255,255,255,0.03) 50%, rgba(0,0,0,0) 100%);
            opacity: 0.15;
            position: absolute;
            bottom: 100%;
            animation: scanline 8s linear infinite;
            pointer-events: none;
        }
        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }
        @keyframes tabFadeIn {
            0% { opacity: 0; transform: translateY(6px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

        );

            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        );

        function App() {
            // --- DATA VERSION GATE: bump this whenever the app's data shape changes so users are prompted to re-enter data cleanly ---
            const APP_DATA_VERSION = '2';

            // --- STATE: ONBOARDING ---
            const [hasOnboarded, setHasOnboarded] = useState(() => {
                const storedVersion = localStorage.getItem('sl_dataVersion');
                if (storedVersion !== APP_DATA_VERSION) return false; // new version → require fresh data entry
                return localStorage.getItem('sl_hasOnboarded') === 'true';
            });
            const hydratedRef = useRef(false); // prevents any save-effect from firing before data has been read from storage

            // --- STATE: USER DATA ---
            const [playerName, setPlayerName] = useState(() => localStorage.getItem('sl_playerName') || "");
            const [age, setAge] = useState(() => parseInt(localStorage.getItem('sl_age')) || 39);
            const [height, setHeight] = useState(() => parseFloat(localStorage.getItem('sl_height')) || 178);
            const [currentWeight, setCurrentWeight] = useState(() => parseFloat(localStorage.getItem('sl_currentWeight')) || 86);
            const [targetWeight, setTargetWeight] = useState(() => parseFloat(localStorage.getItem('sl_targetWeight')) || 75);
            const [maxPushups, setMaxPushups] = useState(() => parseInt(localStorage.getItem('sl_maxPushups')) || 5);
            const [waistCircumference, setWaistCircumference] = useState(() => parseFloat(localStorage.getItem('sl_waistCircumference')) || 95);
            
            // --- STATE: RPG SYSTEM ---
            const [xp, setXp] = useState(() => parseInt(localStorage.getItem('sl_xp')) || 120);
            const [skillLevel, setSkillLevel] = useState(() => parseInt(localStorage.getItem('sl_skillLevel')) || 1);
            const xpToNextLevel = 500;
            
            const [stats, setStats] = useState(() => {
                const saved = localStorage.getItem('sl_stats');
                return saved ? JSON.parse(saved) : { STR: 15, AGI: 25, END: 30, VIT: 35, DISC: 10 };
            });

            const [streak, setStreak] = useState(() => parseInt(localStorage.getItem('sl_streak')) || 1); // Dimulai dari Hari ke-1
            const [isDisciplineGateUnlocked, setIsDisciplineGateUnlocked] = useState(() => localStorage.getItem('sl_disciplineGate') === 'true');

            const [dailyQuests, setDailyQuests] = useState(() => {
                const saved = localStorage.getItem('sl_dailyQuests');
                return saved ? JSON.parse(saved) : { steps: false, water: false, sleep: false };
            });
            const [workoutPenaltyClaimed, setWorkoutPenaltyClaimed] = useState(() => localStorage.getItem('sl_penaltyClaimed') === 'true');

            const [activeTab, setActiveTab] = useState('status');
            const [selectedDay, setSelectedDay] = useState(1);
            const [workoutChecks, setWorkoutChecks] = useState({});
            const [workoutCompletedToday, setWorkoutCompletedToday] = useState(() => localStorage.getItem('sl_workoutCompletedToday') === 'true');
            
            const [timerCount, setTimerCount] = useState(60);
            const [timerActive, setTimerActive] = useState(false);

            // --- STATE: AUTO RUN DUNGEON ---
            const [autoDungeonActive, setAutoDungeonActive] = useState(false);
            const [autoDungeonPhase, setAutoDungeonPhase] = useState('idle'); // idle, exercise, restEx, restRound, completed
            const [autoRound, setAutoRound] = useState(1);
            const [autoExIndex, setAutoExIndex] = useState(0);
            const [autoFinisherIndex, setAutoFinisherIndex] = useState(0);
            const [autoTimerCount, setAutoTimerCount] = useState(0);

            const [logs, setLogs] = useState(() => {
                const saved = localStorage.getItem('sl_logs');
                return saved ? JSON.parse(saved) : [{ date: 'Awal (Hari 1)', weight: 86, pushups: 5, waist: 95 }];
            });

            // --- STATE: DEVICE-TIME DAY TRACKING & BOOT SPLASH ---
            const [lastActiveDate, setLastActiveDate] = useState(() => localStorage.getItem('sl_lastActiveDate') || null);
            const [showBootSplash, setShowBootSplash] = useState(false);
            const bootCheckedRef = useRef(false);

            const [inputWeight, setInputWeight] = useState('');
            const [inputPushups, setInputPushups] = useState('');
            const [inputWaist, setInputWaist] = useState('');
            const [inputArm, setInputArm] = useState('');
            const [inputPlank, setInputPlank] = useState('');
            const [inputSquat, setInputSquat] = useState('');

            const [showSettings, setShowSettings] = useState(false);
            const [settingsDraft, setSettingsDraft] = useState(null);
            const wakeLockRef = useRef(null);

            // --- STATE: ACHIEVEMENTS ---
            const [unlockedAchievements, setUnlockedAchievements] = useState(() => {
                const saved = localStorage.getItem('sl_achievements');
                return saved ? JSON.parse(saved) : [];
            });
            const [startWeight, setStartWeight] = useState(() => parseFloat(localStorage.getItem('sl_startWeight')) || currentWeight);
            const [startPushups, setStartPushups] = useState(() => {
                const saved = localStorage.getItem('sl_startPushups');
                return saved !== null ? parseInt(saved) : maxPushups;
            });

            // --- STATE: QUICK WATER LOG ---
            const [waterMl, setWaterMl] = useState(() => parseInt(localStorage.getItem('sl_waterMl')) || 0);

            // --- STATE: TOTAL DUNGEONS COMPLETED (used for trophy accuracy, separate from baseline log) ---
            const [dungeonsCompletedTotal, setDungeonsCompletedTotal] = useState(() => parseInt(localStorage.getItem('sl_dungeonsCompletedTotal')) || 0);

            // --- STATE: CUSTOM REMINDER HOURS ---
            const [reminderHours, setReminderHours] = useState(() => {
                const saved = localStorage.getItem('sl_reminderHours');
                return saved ? JSON.parse(saved) : [18, 21, 23];
            });

            // --- STATE: PWA INSTALL PROMPT ---
            const [installPrompt, setInstallPrompt] = useState(null);
            const [isInstallable, setIsInstallable] = useState(false);

            const [soundEnabled, setSoundEnabled] = useState(true);
            const [systemAlert, setSystemAlert] = useState(null);

            // --- STATE: CINEMATIC OVERLAY (LEVEL UP / DUNGEON CLEAR) ---
            const [cinematicEvent, setCinematicEvent] = useState(null); // { type: 'levelup'|'dungeonclear', payload }
            const notifiedHoursRef = useRef({});
            const [now, setNow] = useState(new Date());

            // --- SAVE TO LOCALSTORAGE ON CHANGES (fires immediately, including right after onboarding) ---
            useEffect(() => {
                if (!hasOnboarded) return;
                localStorage.setItem('sl_hasOnboarded', 'true');
                localStorage.setItem('sl_dataVersion', APP_DATA_VERSION);
                localStorage.setItem('sl_playerName', playerName);
                localStorage.setItem('sl_age', age);
                localStorage.setItem('sl_height', height);
                localStorage.setItem('sl_currentWeight', currentWeight);
                localStorage.setItem('sl_targetWeight', targetWeight);
                localStorage.setItem('sl_maxPushups', maxPushups);
                localStorage.setItem('sl_waistCircumference', waistCircumference);
                localStorage.setItem('sl_xp', xp);
                localStorage.setItem('sl_skillLevel', skillLevel);
                localStorage.setItem('sl_stats', JSON.stringify(stats));
                localStorage.setItem('sl_streak', streak);
                localStorage.setItem('sl_disciplineGate', isDisciplineGateUnlocked);
                localStorage.setItem('sl_dailyQuests', JSON.stringify(dailyQuests));
                localStorage.setItem('sl_penaltyClaimed', workoutPenaltyClaimed);
                localStorage.setItem('sl_workoutCompletedToday', workoutCompletedToday);
                localStorage.setItem('sl_logs', JSON.stringify(logs));
                localStorage.setItem('sl_achievements', JSON.stringify(unlockedAchievements));
                localStorage.setItem('sl_waterMl', waterMl);
                localStorage.setItem('sl_dungeonsCompletedTotal', dungeonsCompletedTotal);
                localStorage.setItem('sl_reminderHours', JSON.stringify(reminderHours));
                if (!localStorage.getItem('sl_startWeight')) {
                    localStorage.setItem('sl_startWeight', startWeight);
                }
                if (!localStorage.getItem('sl_startPushups')) {
                    localStorage.setItem('sl_startPushups', startPushups);
                }
                hydratedRef.current = true;
            }, [hasOnboarded, playerName, age, height, currentWeight, targetWeight, maxPushups, waistCircumference, xp, skillLevel, stats, streak, isDisciplineGateUnlocked, dailyQuests, workoutPenaltyClaimed, workoutCompletedToday, logs, unlockedAchievements, waterMl, dungeonsCompletedTotal, reminderHours, startWeight, startPushups]);

            // --- HELPER: GET CURRENT RANK KEY (for daily quest scaling) ---
            const getRankKey = () => currentWeight > 84 ? 'E' : currentWeight > 80 ? 'D' : 'C';

            // --- DYNAMIC THEMING BY LEVEL / WEIGHT (RANK) ---
            const getTheme = (weightOverride) => {
                const w = weightOverride != null ? weightOverride : currentWeight;
                if (w > 84) return { 
                    name: 'RANK E (Recruit)', bg: 'bg-blue-600', text: 'text-blue-400', border: 'border-blue-500/50', 
                    grad: 'from-blue-900 to-slate-900', glow: 'shadow-[0_0_15px_rgba(59,130,246,0.4)]',
                    fill: '#3b82f6', subBg: 'bg-blue-950/40', textGlow: 'text-blue-400 drop-shadow-[0_0_8px_rgba(59,130,246,0.5)]'
                };
                if (w > 79) return { 
                    name: 'RANK D (Elite)', bg: 'bg-purple-600', text: 'text-purple-400', border: 'border-purple-500/50', 
                    grad: 'from-purple-900 to-slate-900', glow: 'shadow-[0_0_15px_rgba(168,85,247,0.4)]',
                    fill: '#a855f7', subBg: 'bg-purple-950/40', textGlow: 'text-purple-400 drop-shadow-[0_0_8px_rgba(168,85,247,0.5)]'

                return {

                        osc.frequency.exponentialRampToValueAtTime(1500, ctx.currentTime + 0.08);
                        gain.gain.setValueAtTime(0.1, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.start();
                        osc.stop(ctx.currentTime + 0.08);
                    } else if (type === 'arise') {
                        // Ominous Bass sweep
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(110, ctx.currentTime);

                            osc.frequency.setValueAtTime(freq, now + index * 0.1);

                            gain.connect(ctx.destination);

                { id: 'rankC', icon: '🟣', title: 'Naik ke Rank C', desc: 'Berhasil naik peringkat menjadi Rank C.', check: () => startWeight > 80 && currentWeight <= 80 },
                { id: 'shadowHunter', icon: '👤', title: 'Shadow Hunter', desc: 'Mencapai status Shadow Hunter.', check: () => startWeight > 75 && isShadowHunter },
                { id: 'level10', icon: '⭐', title: 'Skill Level 10', desc: 'Mencapai Skill Level 10.', check: () => skillLevel >= 10 },
                { id: 'plank60', icon: '🧘', title: 'Plank 60 Detik', desc: 'Menahan plank selama 60 detik.', check: () => logs.some(l => l.plank != null && l.plank >= 60) },
            ];

            // --- BOSS BATTLE: WEEKLY EVALUATION FRAMED AS BOSS FIGHT ---
            const bossTotalHp = Math.max(1, startWeight - targetWeight);
            const bossDamageDealt = Math.max(0, Math.min(bossTotalHp, startWeight - currentWeight));
            const bossHpRemainingPct = Math.max(0, Math.min(100, ((bossTotalHp - bossDamageDealt) / bossTotalHp) * 100));
            const bossDefeated = bossHpRemainingPct <= 0;

            // --- SKILL TREE: UNLOCKS BASED ON SKILL LEVEL ---
            const SKILL_TREE = [
                { level: 1, name: 'Basic Push Up', icon: '🥊', unlocked: true },
                { level: 3, name: 'Diamond Push Up', icon: '💎' },
                { level: 5, name: 'Plank Variation', icon: '🧘' },
                { level: 7, name: 'Explosive Burpee', icon: '💥' },
                { level: 10, name: 'Shadow Sprint (HIIT)', icon: '⚡' },
                { level: 13, name: 'Monarch Core Circuit', icon: '👑' },
            ].map(s => ({ ...s, unlocked: s.unlocked || skillLevel >= s.level }));

            // --- REWARD XP FUNCTION ---
            const gainXp = (amount) => {
                setXp((prevXp) => {
                    const newXp = prevXp + amount;
                    if (newXp >= xpToNextLevel) {
                        setSkillLevel((prevLvl) => prevLvl + 1);
                        setStats((prevStats) => ({
                            STR: prevStats.STR + 3,
                            AGI: prevStats.AGI + 2,
                            END: prevStats.END + 3,
                            VIT: prevStats.VIT + 2,
                            DISC: prevStats.DISC + 4,
                        }));
                        setTimeout(() => {
                            playSound('levelUp');
                            setCinematicEvent({ type: 'levelup', level: skillLevel + 1 });
                            triggerAlert("SKILL LEVEL UP!", `Selamat! Anda berhasil meningkatkan Skill Level Anda ke Level ${skillLevel + 1}.`, false);
                        }, 100);
                        return newXp - xpToNextLevel;
                    }
                    return newXp;
                });
            };

            // --- NUTRITION CALCULATOR (INDONESIAN LOW BUDGET) ---
            const generateNutrition = () => {
                // Kalkulasi BMR (Mifflin-St Jeor)
                const bmr = 10 * currentWeight + 6.25 * height - 5 * age + 5; 
                const tdee = bmr * (workoutCompletedToday ? 1.375 : 1.2);
                const targetCal = Math.round(tdee - 500); // Kalori defisit untuk turun berat badan

                // Low budget protein, carbs, veggies Indonesia
                const listProtein = [
                    "2 Butir Telur Rebus (Bumbu minimalis / kecap)",
                    "1 Porsi Tempe & Tahu Goreng (Sedikit Minyak)",
                    "1 Ekor Lele Bakar Tanpa Santan",
                    "100g Dada Ayam Fillet Rebus / Suwir",
                    "1 Piring Kecil Tumis Tahu Jamur Tiram"
                ];
                const listKarbo = [
                    "1 Centong Nasi Putih / Merah Hangat",
                    "1 Buah Ubi Jalar Kukus Ukuran Sedang",
                    "1 Buah Kentang Rebus Kulit",
                    "4 Sendok Makan Oatmeal Instan"
                ];
                const listSayur = [
                    "Sayur Sop Wortel Kol (Tanpa Minyak)",
                    "Sayur Bayam Bening Segar",
                    "Tumis Kangkung Pedas (Sedikit Minyak)",
                    "Lalapan Timun, Kemangi, dan Kol"
                ];

                const hash = (str) => {
                    let h = 0;
                    for (let i = 0; i < str.length; i++) h = str.charCodeAt(i) + ((h << 5) - h);
                    return Math.abs(h);
                };

                const getMeal = (arr, seedValue) => {
                    const seed = hash(playerName + selectedDay + seedValue);
                    return arr[seed % arr.length];
                };

                return {
                    cal: targetCal,
                    meals: [
                        { time: "Pagi", menu: `${getMeal(listProtein, 1)} + ${getMeal(listKarbo, 2)}` },
                        { time: "Siang", menu: `${getMeal(listProtein, 3)} + ${getMeal(listKarbo, 4)} + ${getMeal(listSayur, 5)}` },
                        { time: "Malam", menu: `${getMeal(listProtein, 6)} + ${getMeal(listSayur, 7)} (Sangat batasi Karbohidrat)` },
                        { time: "Snack Sehat", menu: "1 Buah Pisang Ambon / Pepaya Potong Dingin" }
                    ]
                };
            };
            const nutrition = generateNutrition();

            // --- USER ACTION HANDLERS ---
            const handleDailyCheck = (key) => {
                playSound('click');
                setDailyQuests(prev => {
                    const updated = !prev[key];
                    if (updated) {
                        const xpReward = dailyQuestConfig[key].xp;
                        gainXp(xpReward);
                        triggerAlert("QUEST SELESAI!", `Misi harian selesai! +${xpReward} XP diperoleh.`, false);
                    }
                    return { ...prev, [key]: updated };
                });
            };

            const handleAddWater = (amountMl) => {
                playSound('click');
                setWaterMl(prev => {
                    const updated = Math.max(0, prev + amountMl);
                    const target = dailyQuestConfig.water.targetMl;
                    if (updated >= target && !dailyQuests.water) {
                        const xpReward = dailyQuestConfig.water.xp;
                        gainXp(xpReward);
                        setDailyQuests(dq => ({ ...dq, water: true }));
                        setTimeout(() => triggerAlert("QUEST SELESAI!", `Target hidrasi tercapai! +${xpReward} XP diperoleh.`, false), 50);
                    }
                    return updated;
                });
            };

            const handlePenalty = () => {
                if (workoutPenaltyClaimed) return;
                playSound('penalty');
                setWorkoutPenaltyClaimed(true);
                setXp(prev => Math.max(0, prev - 20));
                triggerAlert("PENALTY APPLIED", "Melewatkan latihan harian tanpa alasan medis. -20 XP dikurangi dari sistem!", true);
            };

            const handleExerciseCheck = (exIndex) => {
                playSound('click');
                const key = `day-${selectedDay}-ex-${exIndex}`;
                setWorkoutChecks(prev => ({
                    ...prev,
                    [key]: !prev[key]
                }));
            };

            const completeActiveWorkout = () => {
                playSound('questComplete');
                setCinematicEvent({ type: 'dungeonclear', day: selectedDay });
                gainXp(workouts[selectedDay].xp);
                setWorkoutCompletedToday(true);
                setDungeonsCompletedTotal(prev => prev + 1);
                
                // Progress streak
                setStreak(prev => {
                    const nextStreak = prev + 1;
                    if (nextStreak >= 30 && !isDisciplineGateUnlocked) {
                        setIsDisciplineGateUnlocked(true);
                        gainXp(1000);
                        triggerAlert("HIDDEN QUEST SELESAI!", "Gerbang Disiplin Terbuka! +1000 XP & Fitur Hunter Mode Aktif!", false);
                    }
                    return nextStreak;
                });

                // Upgrade stats
                setStats(prev => ({
                    ...prev,
                    DISC: prev.DISC + 3,
                    STR: prev.STR + (selectedDay === 1 || selectedDay === 4 ? 2 : 0),
                    VIT: prev.VIT + (selectedDay === 3 ? 1 : 0),
                    AGI: prev.AGI + (selectedDay === 2 || selectedDay === 5 ? 2 : 0)
                }));

                triggerAlert("DUNGEON CLEARED!", `Anda menyelesaikan latihan Day ${selectedDay}! +${workouts[selectedDay].xp} XP & status Anda ditingkatkan.`, false);
            };

            // --- AUTOMATED WORKOUT ENGINE CONTROLLER ---
            const startAutoDungeon = () => {
                playSound('arise');
                const mainExercises = workouts[selectedDay].exercises.filter(ex => !ex.once);
                setAutoDungeonActive(true);
                setAutoRound(1);
                setAutoExIndex(0);
                setAutoFinisherIndex(0);
                setAutoDungeonPhase('exercise');
                setAutoTimerCount(mainExercises[0].duration);
                // Reset manual workout checks
                setWorkoutChecks({});
            };

            const stopAutoDungeon = () => {
                playSound('click');
                setAutoDungeonActive(false);
                setAutoDungeonPhase('idle');
            };

            // --- SCREEN WAKE LOCK: KEEP SCREEN ON DURING AUTO BATTLE ---
            const requestWakeLock = async () => {
                try {
                    if ('wakeLock' in navigator) {
                        wakeLockRef.current = await navigator.wakeLock.request('screen');
                    }
                } catch (e) {
                    console.warn('Wake Lock tidak tersedia:', e);
                }
            };
            const releaseWakeLock = () => {
                if (wakeLockRef.current) {
                    wakeLockRef.current.release().catch(() => {});
                    wakeLockRef.current = null;
                }
            };
            useEffect(() => {
                if (autoDungeonActive) {
                    requestWakeLock();
                } else {
                    releaseWakeLock();
                }
                return () => releaseWakeLock();
            }, [autoDungeonActive]);
            // Re-acquire wake lock when tab becomes visible again mid-battle (browsers release it automatically on tab switch)
            useEffect(() => {
                const handleVisibility = () => {
                    if (autoDungeonActive && document.visibilityState === 'visible') {
                        requestWakeLock();
                    }
                };
                document.addEventListener('visibilitychange', handleVisibility);
                return () => document.removeEventListener('visibilitychange', handleVisibility);
            }, [autoDungeonActive]);

            const handleNextAutoPhase = () => {
                const dayData = workouts[selectedDay];
                const mainExercises = dayData.exercises.filter(ex => !ex.once);
                const finisherExercises = dayData.exercises.filter(ex => ex.once);
                const totalExercises = mainExercises.length;

                if (autoDungeonPhase === 'exercise') {
                    // Mark current as done (index refers to position within the full exercises array for checklist consistency)
                    const globalIdx = dayData.exercises.indexOf(mainExercises[autoExIndex]);
                    setWorkoutChecks(prev => ({
                        ...prev,
                        [`day-${selectedDay}-ex-${globalIdx}`]: true
                    }));

                    if (autoExIndex === totalExercises - 1) {
                        // Selesai satu ronde dari gerakan utama
                        if (autoRound === dayData.rounds) {
                            // Semua ronde utama selesai — lanjut ke gerakan "sekali jalan" (cardio panjang) jika ada
                            if (finisherExercises.length > 0) {
                                setAutoDungeonPhase('restRound');
                                setAutoTimerCount(dayData.restRound);
                            } else {
                                setAutoDungeonPhase('completed');
                                completeActiveWorkout();
                            }
                        } else {
                            setAutoDungeonPhase('restRound');
                            setAutoTimerCount(dayData.restRound);
                        }
                    } else {
                        setAutoDungeonPhase('restEx');
                        setAutoTimerCount(dayData.restEx);
                    }
                } else if (autoDungeonPhase === 'finisher') {
                    const globalIdx = dayData.exercises.indexOf(finisherExercises[autoFinisherIndex]);
                    setWorkoutChecks(prev => ({
                        ...prev,
                        [`day-${selectedDay}-ex-${globalIdx}`]: true
                    }));
                    const nextFinisherIdx = autoFinisherIndex + 1;
                    if (nextFinisherIdx >= finisherExercises.length) {
                        setAutoDungeonPhase('completed');
                        completeActiveWorkout();
                    } else {
                        setAutoFinisherIndex(nextFinisherIdx);
                        setAutoDungeonPhase('restEx');
                        setAutoTimerCount(dayData.restEx);
                    }
                } else if (autoDungeonPhase === 'restEx') {
                    const nextIdx = autoExIndex + 1;
                    setAutoExIndex(nextIdx);
                    setAutoDungeonPhase('exercise');
                    setAutoTimerCount(mainExercises[nextIdx].duration);
                } else if (autoDungeonPhase === 'restRound') {
                    if (autoRound === dayData.rounds && finisherExercises.length > 0 && autoExIndex === totalExercises - 1) {
                        // Transisi khusus: semua ronde utama sudah selesai, mulai gerakan cardio "sekali jalan"
                        setAutoFinisherIndex(0);
                        setAutoDungeonPhase('finisher');
                        setAutoTimerCount(finisherExercises[0].duration);
                    } else {
                        setAutoRound(prev => prev + 1);
                        setAutoExIndex(0);
                        setAutoDungeonPhase('exercise');
                        setAutoTimerCount(mainExercises[0].duration);
                    }
                }
            };

            const handleWeeklyLogSubmit = (e) => {
                e.preventDefault();
                const w = parseFloat(inputWeight);
                const p = parseInt(inputPushups);
                const wa = parseFloat(inputWaist);
                const arm = inputArm === '' ? null : parseFloat(inputArm);
                const plank = inputPlank === '' ? null : parseInt(inputPlank);
                const squat = inputSquat === '' ? null : parseInt(inputSquat);

                if (isNaN(w) || isNaN(p) || isNaN(wa)) {
                    triggerAlert("INPUT ERROR", "Mohon isi minimal Berat Badan, Push Up, dan Lingkar Perut dengan angka.", true);
                    return;
                }

                playSound('questComplete');
                
                const newLog = {
                    date: `Minggu ${logs.length} (Hari ${streak})`,
                    weight: w,
                    pushups: p,
                    waist: wa,
                    arm: (arm !== null && !isNaN(arm)) ? arm : null,
                    plank: (plank !== null && !isNaN(plank)) ? plank : null,
                    squat: (squat !== null && !isNaN(squat)) ? squat : null,
                };

                const updatedLogs = [newLog, ...logs];
                setLogs(updatedLogs);
                
                const previousLog = logs[0] || { weight: 86, pushups: 5 };
                const weightLoss = previousLog.weight - w;
                const pushupIncrease = p - previousLog.pushups;
                const plankIncrease = (newLog.plank !== null && previousLog.plank != null) ? newLog.plank - previousLog.plank : 0;
                const squatIncrease = (newLog.squat !== null && previousLog.squat != null) ? newLog.squat - previousLog.squat : 0;

                let textMessage = "";
                if (weightLoss > 0) {
                    gainXp(Math.round(weightLoss * 100));
                    textMessage += `Turun ${weightLoss.toFixed(1)} kg (+${Math.round(weightLoss * 100)} XP)! `;
                }
                if (pushupIncrease > 0) {
                    gainXp(pushupIncrease * 15);
                    textMessage += `Max Push up bertambah +${pushupIncrease} (+${pushupIncrease * 15} XP)! `;
                }
                if (plankIncrease > 0) {
                    gainXp(plankIncrease * 2);
                    textMessage += `Plank bertambah +${plankIncrease}s (+${plankIncrease * 2} XP)! `;
                }
                if (squatIncrease > 0) {
                    gainXp(squatIncrease * 5);
                    textMessage += `Max Squat bertambah +${squatIncrease} (+${squatIncrease * 5} XP)!`;
                }

                setCurrentWeight(w);
                setMaxPushups(p);
                setWaistCircumference(wa);

                setStats(prev => ({
                    ...prev,
                    STR: prev.STR + (pushupIncrease > 0 ? pushupIncrease : 1) + (squatIncrease > 0 ? Math.ceil(squatIncrease / 2) : 0),
                    VIT: prev.VIT + (weightLoss > 0 ? Math.ceil(weightLoss * 2) : 1),
                    END: prev.END + (plankIncrease > 0 ? Math.ceil(plankIncrease / 5) : 0)
                }));

                if (isShadowHunter || w <= targetWeight) {
                    triggerAlert("TARGET TERCAPAI!", `Selamat Hunter! Berat badan target ${targetWeight} kg telah tercapai! ${textMessage}`, false);
                } else {
                    triggerAlert("EVALUASI SELESAI", `Data berhasil disinkronisasi ke sistem! ${textMessage}`, false);
                }

                setInputWeight('');
                setInputPushups('');
                setInputWaist('');
                setInputArm('');
                setInputPlank('');
                setInputSquat('');
            };

            const startNewDay = () => {
                playSound('click');
                setDailyQuests({ steps: false, water: false, sleep: false });
                setWaterMl(0);
                setWorkoutPenaltyClaimed(false);
                setWorkoutCompletedToday(false);
                setWorkoutChecks({});
                triggerAlert("SISTEM DI-RESET", "Misi harian di-reset. Selamat bertarung kembali, Hunter!", false);
            };

            // --- EXPORT / IMPORT DATA (JSON BACKUP) ---
            const handleExportData = () => {
                playSound('click');
                const exportKeys = ['sl_hasOnboarded','sl_playerName','sl_age','sl_height','sl_currentWeight','sl_targetWeight','sl_maxPushups','sl_waistCircumference','sl_xp','sl_skillLevel','sl_stats','sl_streak','sl_disciplineGate','sl_dailyQuests','sl_penaltyClaimed','sl_workoutCompletedToday','sl_logs','sl_achievements','sl_waterMl','sl_dungeonsCompletedTotal','sl_reminderHours','sl_startWeight','sl_startPushups'];
                const data = {};
                exportKeys.forEach(k => { const v = localStorage.getItem(k); if (v !== null) data[k] = v; });
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `solo-leveling-backup-${new Date().toISOString().slice(0,10)}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                triggerAlert("DATA DIEKSPOR", "Backup data berhasil diunduh sebagai file JSON.", false);
            };

            const handleImportData = (file) => {
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        Object.entries(data).forEach(([k, v]) => localStorage.setItem(k, v));
                        triggerAlert("DATA DIIMPOR", "Backup berhasil dipulihkan. Memuat ulang sistem...", false);
                        setTimeout(() => window.location.reload(), 1200);
                    } catch (err) {
                        triggerAlert("IMPORT GAGAL", "File backup tidak valid atau rusak.", true);
                    }
                };
                reader.readAsText(file);
            };

            // --- FULL DATA WIPE: hapus seluruh progres Hunter dan mulai dari nol ---
            const handleFullResetData = () => {
                const sure = window.confirm("Yakin ingin menghapus SEMUA data Hunter (level, XP, stats, riwayat, trophy) dan mulai dari NOL? Tindakan ini tidak bisa dibatalkan.");
                if (!sure) return;
                const sureAgain = window.confirm("Konfirmasi sekali lagi: SEMUA progres akan hilang permanen. Lanjutkan?");
                if (!sureAgain) return;
                Object.keys(localStorage).forEach(k => {
                    if (k.startsWith('sl_')) localStorage.removeItem(k);
                });
                window.location.reload();
            };

            const handleOnboardSubmit = (e) => {
                e.preventDefault();
                playSound('arise');
                
                let str = 10 + Math.floor(maxPushups);
                let agi = 20 - Math.floor(currentWeight / 10);
                
                setStats({ STR: str, AGI: Math.max(5, agi), END: 15, VIT: 20, DISC: 10 });
                setLogs([{ date: 'Awal', weight: currentWeight, pushups: maxPushups, waist: waistCircumference }]);
                setStartWeight(currentWeight);
                localStorage.setItem('sl_startWeight', currentWeight);
                setStartPushups(maxPushups);
                localStorage.setItem('sl_startPushups', maxPushups);
                setHasOnboarded(true);
            };

            // --- AUTO DISMISS CINEMATIC OVERLAY ---
            useEffect(() => {
                if (cinematicEvent) {
                    const t = setTimeout(() => setCinematicEvent(null), 2600);
                    return () => clearTimeout(t);
                }
            }, [cinematicEvent]);

            // --- ACHIEVEMENT DETECTION ---
            useEffect(() => {
                if (!hasOnboarded) return;
                const newlyUnlocked = ACHIEVEMENTS.filter(a => a.check() && !unlockedAchievements.includes(a.id));
                if (newlyUnlocked.length > 0) {
                    setUnlockedAchievements(prev => [...prev, ...newlyUnlocked.map(a => a.id)]);
                    const first = newlyUnlocked[0];
                    setTimeout(() => {
                        playSound('levelUp');
                        triggerAlert("🏆 ACHIEVEMENT UNLOCKED!", `${first.icon} ${first.title} — ${first.desc}`, false);
                    }, 300);
                }
            }, [hasOnboarded, streak, currentWeight, maxPushups, skillLevel, logs, isShadowHunter, dungeonsCompletedTotal, startWeight, startPushups, targetWeight]);

            // --- PWA INSTALL PROMPT LISTENER ---
            useEffect(() => {
                if (window.__slDeferredInstallPrompt) setIsInstallable(true);
                const handler = () => setIsInstallable(true);
                window.addEventListener('sl-installable', handler);
                return () => window.removeEventListener('sl-installable', handler);
            }, []);

            const handleInstallApp = async () => {
                const promptEvent = window.__slDeferredInstallPrompt;
                if (!promptEvent) {
                    triggerAlert("INSTALL TIDAK TERSEDIA", "Browser Anda belum menawarkan instalasi, atau app sudah terpasang.", true);
                    return;
                }
                promptEvent.prompt();
                await promptEvent.userChoice;
                window.__slDeferredInstallPrompt = null;
                setIsInstallable(false);
            };

            // --- RADAR CHART RENDERER (5-AXIS STAT WEB) ---
            const renderRadarChart = () => {
                const axes = [
                    { key: 'STR', label: 'STR', color: '#f87171' },
                    { key: 'AGI', label: 'AGI', color: '#fbbf24' },
                    { key: 'END', label: 'END', color: '#34d399' },
                    { key: 'VIT', label: 'VIT', color: '#60a5fa' },
                    { key: 'DISC', label: 'DISC', color: '#c084fc' },
                ];
                const size = 220;
                const center = size / 2;
                const radius = 85;
                const maxVal = 100;
                const angleStep = (Math.PI * 2) / axes.length;

                const getPoint = (i, value) => {
                    const angle = angleStep * i - Math.PI / 2;
                    const r = (Math.min(value, maxVal) / maxVal) * radius;
                    return {
                        x: center + r * Math.cos(angle),
                        y: center + r * Math.sin(angle)
                    };
                };
                const getLabelPoint = (i) => {
                    const angle = angleStep * i - Math.PI / 2;
                    return {
                        x: center + (radius + 22) * Math.cos(angle),
                        y: center + (radius + 22) * Math.sin(angle)
                    };
                };

                const dataPoints = axes.map((ax, i) => getPoint(i, stats[ax.key]));
                const polygonPoints = dataPoints.map(p => `${p.x},${p.y}`).join(' ');
                const gridLevels = [0.25, 0.5, 0.75, 1];

                return (
                    <svg viewBox={`0 0 ${size} ${size}`} className="w-full max-w-[260px] mx-auto overflow-visible">
                        {gridLevels.map((lvl, li) => {
                            const pts = axes.map((ax, i) => {
                                const angle = angleStep * i - Math.PI / 2;
                                const r = radius * lvl;
                                return `${center + r * Math.cos(angle)},${center + r * Math.sin(angle)}`;
                            }).join(' ');
                            return <polygon key={li} points={pts} fill="none" stroke="#1e293b" strokeWidth="1" />;
                        })}
                        {axes.map((ax, i) => {
                            const angle = angleStep * i - Math.PI / 2;
                            return (
                                <line key={ax.key} x1={center} y1={center}
                                    x2={center + radius * Math.cos(angle)} y2={center + radius * Math.sin(angle)}
                                    stroke="#1e293b" strokeWidth="1" />
                            );
                        })}
                        <polygon points={polygonPoints} fill={theme.fill} fillOpacity="0.25" stroke={theme.fill} strokeWidth="2" className="drop-shadow-lg" />
                        {dataPoints.map((p, i) => (
                            <circle key={i} cx={p.x} cy={p.y} r="3.5" fill="#020617" stroke={axes[i].color} strokeWidth="2" />
                        ))}
                        {axes.map((ax, i) => {
                            const lp = getLabelPoint(i);
                            return (
                                <text key={ax.key} x={lp.x} y={lp.y} fill={ax.color} fontSize="11" textAnchor="middle" dominantBaseline="middle" className="font-hud font-bold">
                                    {ax.label}
                                </text>
                            );
                        })}
                    </svg>
                );
            };

            // --- GRAPH RENDERER (SVG) ---
            const renderChart = () => {
                if (logs.length < 2) {
                    return <div className="text-center text-slate-500 py-6 text-xs font-mono">Belum cukup data untuk membuat grafik evaluasi. Lakukan input minimal 2 kali.</div>;
                }
                
                const data = [...logs].reverse();
                const w = 320; 
                const h = 120;
                const weights = data.map(d => d.weight);
                const maxW = Math.max(...weights) + 1;
                const minW = Math.min(...weights) - 1;
                
                const getX = (i) => (i / (data.length - 1)) * w;
                const getY = (val) => h - ((val - minW) / (maxW - minW || 1)) * h;

                const points = data.map((d, i) => `${getX(i)},${getY(d.weight)}`).join(' ');

                // --- BODY COMPOSITION OVERLAY: WAIST & ARM (NORMALIZED TO SAME SCALE) ---
                const waistVals = data.map(d => d.waist).filter(v => v != null);
                const armVals = data.map(d => d.arm).filter(v => v != null);
                const hasWaist = waistVals.length >= 2;
                const hasArm = armVals.length >= 2;
                const compMax = Math.max(...waistVals, ...armVals, 1) + 2;
                const compMin = Math.min(...waistVals, ...armVals, 0) - 2;
                const getYComp = (val) => h - ((val - compMin) / (compMax - compMin || 1)) * h;
                const waistPoints = hasWaist ? data.map((d, i) => `${getX(i)},${getYComp(d.waist)}`).join(' ') : '';
                const armPoints = hasArm ? data.filter(d => d.arm != null).map((d) => {
                    const idx = data.indexOf(d);
                    return `${getX(idx)},${getYComp(d.arm)}`;
                }).join(' ') : '';

                return (
                    <div className="relative w-full overflow-hidden mt-4 bg-slate-950/70 rounded-lg p-3 border border-slate-800">
                        {(hasWaist || hasArm) && (
                            <div className="flex gap-4 mb-2 text-[10px] font-mono">
                                <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full" style={{ background: theme.fill }}></span>Berat Badan</span>
                                {hasWaist && <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-amber-400"></span>Lingkar Perut</span>}
                                {hasArm && <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-emerald-400"></span>Lingkar Lengan</span>}
                            </div>
                        )}
                        <svg viewBox={`0 0 ${w} ${h+20}`} className="w-full h-36 overflow-visible">
                            {/* Grid Horizontal */}
                            <line x1="0" y1={h/2} x2={w} y2={h/2} stroke="#334155" strokeDasharray="3" />
                            {/* Body composition lines (secondary) */}
                            {hasWaist && <polyline points={waistPoints} fill="none" stroke="#fbbf24" strokeWidth="2" strokeDasharray="4,3" opacity="0.8" />}
                            {hasArm && <polyline points={armPoints} fill="none" stroke="#34d399" strokeWidth="2" strokeDasharray="4,3" opacity="0.8" />}
                            {/* Garis Data Berat Badan (primary) */}
                            <polyline points={points} fill="none" stroke={theme.fill} strokeWidth="3" className="drop-shadow-lg" />
                            {/* Titik Detail */}
                            {data.map((d, i) => (
                                <g key={i}>
                                    <circle cx={getX(i)} cy={getY(d.weight)} r="4" fill="#020617" stroke={theme.fill} strokeWidth="2" />
                                    <text x={getX(i)} y={getY(d.weight) - 8} fill="#e2e8f0" fontSize="9" textAnchor="middle" className="font-hud font-bold">{d.weight} kg</text>
                                    <text x={getX(i)} y={h+15} fill="#64748b" fontSize="8" textAnchor="middle" className="font-mono">{d.date.split(' ')[0]}</text>
                                </g>
                            ))}
                        </svg>
                    </div>
                );
            };

            // ==========================================
            // SCREEN: ONBOARDING / INTRO
            // ==========================================
            if (!hasOnboarded) {
                return (
                    <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center p-4 relative overflow-hidden">
                        <div className="absolute inset-0 bg-blue-900/10 blur-[100px] rounded-full pointer-events-none"></div>
                        
                        <div className="z-10 w-full max-w-sm bg-slate-900/80 backdrop-blur border border-blue-500/30 rounded-xl p-6 shadow-[0_0_30px_rgba(59,130,246,0.25)]">
                            <div className="text-center mb-6">
                                <h1 className="text-2xl font-bold font-hud text-blue-400 tracking-widest">SYSTEM AWAKENING</h1>
                                <p className="text-xs text-slate-400 font-mono mt-1">Masukkan parameter fisik untuk memulai.</p>
                            </div>
                            
                            <form onSubmit={handleOnboardSubmit} className="space-y-4 text-xs font-mono">
                                <div>
                                    <label className="text-slate-400 block mb-1">Nama Hunter:</label>
                                    <input type="text" required onChange={e=>setPlayerName(e.target.value)} className="w-full p-2.5 rounded bg-slate-950 border border-slate-700 text-white focus:border-blue-500 focus:outline-none"/>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <div>
                                        <label className="text-slate-400 block mb-1">Umur:</label>
                                        <input type="number" required onChange={e=>setAge(parseInt(e.target.value))} className="w-full p-2.5 rounded bg-slate-950 border border-slate-700 text-white focus:border-blue-500/80 focus:outline-none"/>
                                    </div>
                                    <div>
                                        <label className="text-slate-400 block mb-1">Tinggi (cm):</label>
                                        <input type="number" required onChange={e=>setHeight(parseFloat(e.target.value))} className="w-full p-2.5 rounded bg-slate-950 border border-slate-700 text-white focus:border-blue-500/80 focus:outline-none"/>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <div>
                                        <label className="text-slate-400 block mb-1">Berat (kg):</label>
                                        <input type="number" step="0.1" required onChange={e=>setCurrentWeight(parseFloat(e.target.value))} className="w-full p-2.5 rounded bg-slate-950 border border-slate-700 text-white focus:border-blue-500/80 focus:outline-none"/>
                                    </div>
                                    <div>
                                        <label className="text-slate-400 block mb-1">Max Pushup:</label>
                                        <input type="number" required onChange={e=>setMaxPushups(parseInt(e.target.value))} className="w-full p-2.5 rounded bg-slate-950 border border-slate-700 text-white focus:border-blue-500/80 focus:outline-none"/>
                                    </div>
                                </div>
                                <div>
                                    <label className="text-slate-400 block mb-1">Lingkar Perut (cm):</label>
                                    <input type="number" required onChange={e=>setWaistCircumference(parseFloat(e.target.value))} className="w-full p-2.5 rounded bg-slate-950 border border-slate-700 text-white focus:border-blue-500/80 focus:outline-none"/>
                                </div>
                                <div>
                                    <label className="text-slate-400 block mb-1">Target Berat Badan (kg):</label>
                                    <input type="number" step="0.1" required defaultValue={75} onChange={e=>setTargetWeight(parseFloat(e.target.value))} className="w-full p-2.5 rounded bg-slate-950 border border-slate-700 text-white focus:border-blue-500/80 focus:outline-none"/>
                                </div>
                                
                                <button type="submit" className="w-full py-3.5 mt-4 bg-blue-600 hover:bg-blue-500 text-white font-hud font-bold tracking-widest rounded transition-all active:scale-95 shadow-[0_0_15px_rgba(59,130,246,0.4)]">
                                    AWAKEN
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen relative overflow-x-hidden bg-slate-950">
                    
                    {/* Background Grid */}
                    <div className="absolute inset-0 bg-[linear-gradient(to_right,#0f172a_1px,transparent_1px),linear-gradient(to_bottom,#0f172a_1px,transparent_1px)] bg-[size:4rem_4rem] [mask-image:radial-gradient(ellipse_60%_50%_at_50%_0%,#000_70%,transparent_100%)] pointer-events-none"></div>

                    {/* --- HEADER HUD --- */}
                    <header className={`sticky top-0 z-40 border-b ${theme.border} bg-slate-950/85 backdrop-blur-md transition-all duration-300`}>
                        <div className="max-w-6xl px-4 py-3 mx-auto flex flex-col sm:flex-row justify-between items-center gap-3">
                            
                            <div className="flex items-center gap-3">
                                <div className={`relative flex items-center justify-center w-10 h-10 rounded-lg ${theme.bg} text-slate-950 border ${theme.border} ${theme.glow} animate-pulse`}>
                                    <IconShield />
                                </div>
                                <div>
                                    <h1 className={`text-sm font-bold tracking-widest uppercase font-hud ${theme.textGlow}`}>
                                        Solo Leveling System
                                    </h1>
                                    <p className="text-[10px] text-slate-400 font-mono">
                                        STATUS: ACTIVE • LOCAL SYSTEM PORTAL
                                    </p>
                                </div>
                            </div>

                            <div className="flex items-center gap-3 text-xs font-mono">
                                <button 
                                    onClick={() => { setSoundEnabled(!soundEnabled); playSound('click'); }} 
                                    aria-label={soundEnabled ? 'Matikan efek suara' : 'Nyalakan efek suara'}
                                    className={`p-2.5 min-w-[44px] min-h-[44px] rounded border flex items-center justify-center gap-1 transition-all ${soundEnabled ? `${theme.border} ${theme.subBg} ${theme.text}` : 'border-slate-800 bg-slate-900/50 text-slate-500'}`}
                                >
                                    {soundEnabled ? <IconVolume2 /> : <IconVolumeX />}
                                    <span className="hidden md:inline">{soundEnabled ? 'SFX ON' : 'SFX OFF'}</span>
                                </button>

                                <button
                                    onClick={triggerBrowserNotification}
                                    aria-label="Uji notifikasi pengingat harian"
                                    className={`p-2.5 min-w-[44px] min-h-[44px] rounded border flex items-center justify-center ${theme.border} ${theme.subBg} ${theme.text} hover:scale-105 active:scale-95 transition-all`}
                                    title="Uji Notifikasi Pengingat Harian"
                                >
                                    <IconBell />
                                </button>

                                <button
                                    onClick={() => {
                                        playSound('click');
                                        setSettingsDraft({ playerName, age, height, currentWeight, targetWeight, maxPushups, waistCircumference });
                                        setShowSettings(true);
                                    }}
                                    aria-label="Buka pengaturan biodata dan target"
                                    className={`p-2.5 min-w-[44px] min-h-[44px] rounded border flex items-center justify-center ${theme.border} ${theme.subBg} ${theme.text} hover:scale-105 active:scale-95 transition-all hover:rotate-45 duration-300`}
                                    title="Ubah Biodata & Target"
                                >
                                    <IconSettings />
                                </button>

                                <div className="flex items-center gap-1 px-3 py-1.5 rounded-md bg-orange-950/30 border border-orange-500/20 text-orange-400">
                                    <IconFlame />
                                    <span>STREAK: <strong>{streak} HARI</strong></span>
                                </div>

                                <button 
                                    onClick={startNewDay}
                                    className={`flex items-center gap-1 px-3 py-1.5 rounded-md ${theme.subBg} border ${theme.border} ${theme.text} transition-colors`}
                                >
                                    <IconRefresh />
                                    <span>RESET</span>
                                </button>
                            </div>

                        </div>
                    </header>

                    {/* --- SETTINGS MODAL: EDIT BIODATA & TARGET WEIGHT --- */}
                    {showSettings && settingsDraft && (
                        <div className="fixed inset-0 z-[80] bg-slate-950/90 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className={`w-full max-w-md bg-slate-900 border ${theme.border} rounded-xl p-6 relative ${theme.glow} max-h-[90vh] overflow-y-auto`}>
                                <button
                                    onClick={() => { playSound('click'); setShowSettings(false); }}
                                    aria-label="Tutup pengaturan"
                                    className="absolute top-2 right-2 w-11 h-11 flex items-center justify-center text-slate-500 hover:text-white text-lg rounded-full hover:bg-slate-800/60 transition-colors"
                                >✕</button>
                                <h3 className={`text-sm font-bold tracking-widest uppercase font-hud border-b border-slate-800 pb-2 mb-4 ${theme.text}`}>
                                    ⚙️ PENGATURAN BIODATA HUNTER
                                </h3>
                                <div className="space-y-3 text-xs font-mono">
                                    <div>
                                        <label className="text-slate-400 block mb-1">Nama Hunter:</label>
                                        <input type="text" value={settingsDraft.playerName}
                                            onChange={e => setSettingsDraft({ ...settingsDraft, playerName: e.target.value })}
                                            className="w-full p-2.5 rounded bg-slate-950 border border-slate-700 text-white focus:border-cyan-500 focus:outline-none" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="text-slate-400 block mb-1">Umur:</label>
                                            <input type="number" value={settingsDraft.age}
                                                onChange={e => setSettingsDraft({ ...settingsDraft, age: parseInt(e.target.value) || 0 })}
                                                className="w-full p-2.5 rounded bg-slate-950 border border-slate-700 text-white focus:border-cyan-500 focus:outline-none" />
                                        </div>
                                        <div>
                                            <label className="text-slate-400 block mb-1">Tinggi (cm):</label>
                                            <input type="number" value={settingsDraft.height}
                                                onChange={e => setSettingsDraft({ ...settingsDraft, height: parseFloat(e.target.value) || 0 })}
                                                className="w-full p-2.5 rounded bg-slate-950 border border-slate-700 text-white focus:border-cyan-500 focus:outline-none" />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="text-slate-400 block mb-1">Berat Saat Ini (kg):</label>
                                            <input type="number" step="0.1" value={settingsDraft.currentWeight}
                                                onChange={e => setSettingsDraft({ ...settingsDraft, currentWeight: parseFloat(e.target.value) || 0 })}
                                                className="w-full p-2.5 rounded bg-slate-950 border border-slate-700 text-white focus:border-cyan-500 focus:outline-none" />
                                        </div>
                                        <div>
                                            <label className="text-slate-400 block mb-1">Target Berat (kg):</label>
                                            <input type="number" step="0.1" value={settingsDraft.targetWeight}
                                                onChange={e => setSettingsDraft({ ...settingsDraft, targetWeight: parseFloat(e.target.value) || 0 })}
                                                className="w-full p-2.5 rounded bg-slate-950 border border-cyan-700/50 text-white focus:border-cyan-500 focus:outline-none" />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="text-slate-400 block mb-1">Max Pushup:</label>
                                            <input type="number" value={settingsDraft.maxPushups}
                                                onChange={e => setSettingsDraft({ ...settingsDraft, maxPushups: parseInt(e.target.value) || 0 })}
                                                className="w-full p-2.5 rounded bg-slate-950 border border-slate-700 text-white focus:border-cyan-500 focus:outline-none" />
                                        </div>
                                        <div>
                                            <label className="text-slate-400 block mb-1">Lingkar Perut (cm):</label>
                                            <input type="number" value={settingsDraft.waistCircumference}
                                                onChange={e => setSettingsDraft({ ...settingsDraft, waistCircumference: parseFloat(e.target.value) || 0 })}
                                                className="w-full p-2.5 rounded bg-slate-950 border border-slate-700 text-white focus:border-cyan-500 focus:outline-none" />
                                        </div>
                                    </div>
                                    <p className="text-[10px] text-slate-500 pt-1">
                                        Mengubah Berat Saat Ini/Target akan langsung menyesuaikan Rank, tema warna, dan menu latihan.
                                    </p>

                                    {/* THEME PREVIEW BASED ON DRAFT WEIGHT */}
                                    {(() => {
                                        const previewTheme = getTheme(settingsDraft.currentWeight);
                                        return (
                                            <div className={`flex items-center justify-between p-2.5 rounded border ${previewTheme.border} ${previewTheme.subBg}`}>
                                                <span className="text-[10px] text-slate-400">Preview Tema Rank:</span>
                                                <span className={`text-xs font-bold font-hud ${previewTheme.text} flex items-center gap-2`}>
                                                    <span className={`w-3 h-3 rounded-full ${previewTheme.bg}`}></span>
                                                    {previewTheme.name}
                                                </span>
                                            </div>
                                        );
                                    })()}

                                    {/* CUSTOM REMINDER HOURS */}
                                    <div className="pt-2 border-t border-slate-800/70">
                                        <label className="text-slate-400 block mb-1">Jam Pengingat Harian (pisahkan koma, format 24 jam):</label>
                                        <input type="text" defaultValue={reminderHours.join(', ')}
                                            onBlur={e => {
                                                const parsed = e.target.value.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n) && n >= 0 && n <= 23);
                                                if (parsed.length > 0) setReminderHours(parsed);
                                            }}
                                            placeholder="Contoh: 18, 21, 23"
                                            className="w-full p-2.5 rounded bg-slate-950 border border-slate-700 text-white focus:border-cyan-500 focus:outline-none" />
                                    </div>

                                    <button
                                        onClick={() => {
                                            playSound('questComplete');
                                            setPlayerName(settingsDraft.playerName);
                                            setAge(settingsDraft.age);
                                            setHeight(settingsDraft.height);
                                            setCurrentWeight(settingsDraft.currentWeight);
                                            setTargetWeight(settingsDraft.targetWeight);
                                            setMaxPushups(settingsDraft.maxPushups);
                                            setWaistCircumference(settingsDraft.waistCircumference);
                                            setShowSettings(false);
                                            triggerAlert("BIODATA DIPERBARUI", "Data profil Hunter berhasil disinkronisasi ke sistem.", false);
                                        }}
                                        className={`w-full py-2.5 mt-2 bg-gradient-to-r ${theme.grad} text-white font-hud font-bold uppercase rounded tracking-wider text-xs transition-all active:scale-95 ${theme.glow}`}
                                    >
                                        SIMPAN PERUBAHAN
                                    </button>

                                    {/* EXPORT / IMPORT / INSTALL */}
                                    <div className="pt-3 border-t border-slate-800/70 space-y-2">
                                        <p className="text-[10px] text-slate-500 uppercase tracking-widest">Data & Aplikasi</p>
                                        <div className="grid grid-cols-2 gap-2">
                                            <button onClick={handleExportData}
                                                className="py-2 rounded border border-slate-700 bg-slate-950 text-slate-300 text-[11px] font-bold hover:border-cyan-500 transition-colors">
                                                ⬇️ Export Data
                                            </button>
                                            <label className="py-2 rounded border border-slate-700 bg-slate-950 text-slate-300 text-[11px] font-bold hover:border-cyan-500 transition-colors text-center cursor-pointer">
                                                ⬆️ Import Data
                                                <input type="file" accept=".json" className="hidden" onChange={e => handleImportData(e.target.files[0])} />
                                            </label>
                                        </div>
                                        {isInstallable && (
                                            <button onClick={handleInstallApp}
                                                className={`w-full py-2 rounded border ${theme.border} ${theme.subBg} ${theme.text} text-[11px] font-bold hover:scale-[1.01] transition-transform`}>
                                                📲 Install App ke Home Screen
                                            </button>
                                        )}
                                    </div>

                                    {/* DANGER ZONE: FULL DATA WIPE */}
                                    <div className="pt-3 border-t border-red-900/40 space-y-2">
                                        <p className="text-[10px] text-red-400/80 uppercase tracking-widest font-bold">⚠️ Zona Berbahaya</p>
                                        <button
                                            onClick={handleFullResetData}
                                            className="w-full py-2.5 rounded border border-red-700/60 bg-red-950/30 text-red-400 text-[11px] font-bold hover:bg-red-900/40 hover:border-red-500 transition-colors"
                                        >
                                            🗑️ HAPUS SEMUA DATA & MULAI DARI NOL
                                        </button>
                                        <p className="text-[9px] text-slate-500">
                                            Menghapus level, XP, stats, riwayat evaluasi, trophy, dan seluruh progres Hunter secara permanen dari perangkat ini.
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- BOOT SPLASH: SYSTEM ONLINE NOTIFICATION ON ENTRY --- */}
                    {showBootSplash && (
                        <div className="fixed inset-0 z-[80] flex items-center justify-center p-4 bg-slate-950/95 backdrop-blur-sm animate-[cineTextIn_2.4s_ease-out_forwards]">
                            <div className={`w-full max-w-sm p-6 rounded-lg border ${theme.border} bg-slate-900/80 ${theme.glow} text-center relative overflow-hidden`}>
                                <div className="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-cyan-500"></div>
                                <div className="absolute top-0 right-0 w-4 h-4 border-t-2 border-r-2 border-cyan-500"></div>
                                <div className="absolute bottom-0 left-0 w-4 h-4 border-b-2 border-l-2 border-cyan-500"></div>
                                <div className="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-cyan-500"></div>
                                <p className="text-[10px] font-mono text-cyan-400 tracking-[0.3em] mb-2">● SYSTEM ONLINE</p>
                                <h2 className={`text-xl font-hud font-black tracking-wider ${theme.textGlow}`}>
                                    SELAMAT DATANG, {playerName ? playerName.toUpperCase() : 'HUNTER'}
                                </h2>
                                <p className="text-xs text-slate-400 font-mono mt-2">
                                    {now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}
                                </p>
                                <p className="text-lg text-white font-hud font-bold mt-1 tracking-widest">
                                    {now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}
                                </p>
                                <div className="mt-3 grid grid-cols-2 gap-2 text-[10px] font-mono">
                                    <div className="p-2 rounded bg-slate-950/60 border border-slate-800">
                                        <p className="text-slate-500">LEVEL</p>
                                        <p className={`font-bold ${theme.text}`}>{skillLevel}</p>
                                    </div>
                                    <div className="p-2 rounded bg-slate-950/60 border border-slate-800">
                                        <p className="text-slate-500">STREAK</p>
                                        <p className="font-bold text-orange-400">{streak} Hari</p>
                                    </div>
                                </div>
                                <p className="text-[9px] text-slate-500 font-mono mt-4">
                                    Waktu dihitung otomatis mengikuti jam perangkat ini.
                                </p>
                            </div>
                        </div>
                    )}

                    {/* --- CINEMATIC OVERLAY: LEVEL UP / DUNGEON CLEAR --- */}
                    {cinematicEvent && (
                        <div className="fixed inset-0 z-[70] flex items-center justify-center pointer-events-none overflow-hidden">
                            {/* Flash */}
                            <div className="absolute inset-0 bg-white animate-[cineFlash_0.6s_ease-out_forwards]"></div>
                            {/* Radial energy ring */}
                            <div className={`absolute w-4 h-4 rounded-full ${cinematicEvent.type === 'levelup' ? 'bg-cyan-400' : 'bg-emerald-400'} animate-[cineRing_1.4s_ease-out_forwards]`}></div>
                            {/* Particles */}
                            {Array.from({ length: 18 }).map((_, i) => {
                                const angle = (360 / 18) * i;
                                const dist = 140 + (i % 4) * 30;
                                return (
                                    <span
                                        key={i}
                                        className={`absolute w-1.5 h-1.5 rounded-full ${cinematicEvent.type === 'levelup' ? 'bg-cyan-300' : 'bg-emerald-300'} animate-[cineParticle_1.2s_ease-out_forwards]`}
                                        style={{ '--angle': `${angle}deg`, '--dist': `${dist}px`, animationDelay: `${0.1 + (i % 5) * 0.03}s` }}
                                    ></span>
                                );
                            })}
                            {/* Center Text */}
                            <div className="relative z-10 text-center animate-[cineTextIn_0.9s_ease-out_forwards]">
                                {cinematicEvent.type === 'levelup' ? (
                                    <>
                                        <p className="text-cyan-300 font-hud tracking-[0.4em] text-xs mb-2">SYSTEM NOTIFICATION</p>
                                        <h1 className="text-5xl sm:text-7xl font-hud font-black text-white tracking-wider drop-shadow-[0_0_25px_rgba(34,211,238,0.9)]">
                                            LEVEL UP!
                                        </h1>
                                        <p className="mt-3 font-hud text-2xl sm:text-3xl font-bold text-cyan-300 drop-shadow-[0_0_15px_rgba(34,211,238,0.8)]">
                                            LV. {cinematicEvent.level}
                                        </p>
                                    </>
                                ) : (
                                    <>
                                        <p className="text-emerald-300 font-hud tracking-[0.4em] text-xs mb-2">DUNGEON STATUS</p>
                                        <h1 className="text-4xl sm:text-6xl font-hud font-black text-white tracking-wider drop-shadow-[0_0_25px_rgba(52,211,153,0.9)]">
                                            DUNGEON CLEAR
                                        </h1>
