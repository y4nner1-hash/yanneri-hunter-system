                                        <p className="mt-3 font-hud text-lg sm:text-xl font-bold text-emerald-300 drop-shadow-[0_0_15px_rgba(52,211,153,0.8)]">
                                            DAY {cinematicEvent.day} SECURED
                                        </p>
                                    </>
                                )}
                            </div>
                            <style>{`
                                @keyframes cineFlash { 0% { opacity: 0.85; } 100% { opacity: 0; } }
                                @keyframes cineRing { 0% { width: 0; height: 0; opacity: 0.9; box-shadow: 0 0 0 0 currentColor; } 100% { width: 900px; height: 900px; opacity: 0; box-shadow: 0 0 0 2px currentColor; } }
                                @keyframes cineTextIn { 0% { opacity: 0; transform: scale(0.7); } 30% { opacity: 1; transform: scale(1.08); } 45% { transform: scale(1); } 85% { opacity: 1; } 100% { opacity: 0; transform: scale(1.02); } }
                                @keyframes cineParticle {
                                    0% { transform: translate(0, 0) scale(1); opacity: 1; }
                                    100% { transform: translate(calc(cos(var(--angle)) * var(--dist)), calc(sin(var(--angle)) * var(--dist))) scale(0); opacity: 0; }
                                }
                            `}</style>
                        </div>
                    )}

                    {/* --- POPUP ALERT SYSTEM --- */}
                    {systemAlert && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                            <div className={`w-full max-w-md p-6 rounded-lg border-2 ${theme.glow} bg-slate-900 ${systemAlert.isWarning ? 'border-red-500' : theme.border}`}>
                                <div className="flex items-start gap-4">
                                    <div className={`p-3 rounded-full ${systemAlert.isWarning ? 'bg-red-950 text-red-400' : 'bg-cyan-950 text-cyan-400'}`}>
                                        {systemAlert.isWarning ? <IconAlertTriangle /> : <IconAward />}
                                    </div>
                                    <div className="flex-1">
                                        <h3 className={`text-lg font-bold font-hud tracking-wider ${systemAlert.isWarning ? 'text-red-400' : theme.text}`}>
                                            {systemAlert.title}
                                        </h3>
                                        <p className="mt-2 text-sm text-slate-300 leading-relaxed font-sub">
                                            {systemAlert.message}
                                        </p>
                                        <button
                                            onClick={() => { playSound('click'); setSystemAlert(null); }}
                                            className={`mt-5 w-full py-2 bg-gradient-to-r ${theme.grad} text-white text-xs font-bold font-hud tracking-widest rounded uppercase transition-colors`}
                                        >
                                            TERIMA PESAN SISTEM
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <main className="max-w-6xl px-4 py-8 mx-auto pb-24 sm:pb-8">
                        
                        {/* --- STATUS HEADER --- */}
                        <section className={`mb-8 p-6 rounded-xl border ${theme.border} bg-slate-900/60 relative overflow-hidden`}>
                            <div className="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-blue-500"></div>
                            <div className="absolute top-0 right-0 w-4 h-4 border-t-2 border-r-2 border-blue-500"></div>
                            <div className="absolute bottom-0 left-0 w-4 h-4 border-b-2 border-l-2 border-blue-500"></div>
                            <div className="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-blue-500"></div>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 items-center">
                                
                                <div className="flex items-center gap-4">
                                    <div className={`relative w-20 h-20 rounded-full bg-slate-950 border-4 border-cyan-500/80 flex flex-col items-center justify-center ${theme.glow}`}>
                                        <span className="text-[10px] text-slate-400 uppercase tracking-widest font-hud">LV</span>
                                        <span className="text-3xl font-extrabold text-white font-hud leading-none">
                                            {currentHunterLevel}
                                        </span>
                                        <div className="absolute -bottom-2 px-2 py-0.5 bg-cyan-500 text-[9px] text-slate-950 font-bold font-hud rounded uppercase">
                                            {isShadowHunter ? 'SHADOW' : 'HUNTER'}
                                        </div>
                                    </div>
                                    
                                    <div>
                                        <div className="flex items-center gap-2">
                                            <input 
                                                type="text" 
                                                value={playerName}
                                                onChange={(e) => setPlayerName(e.target.value)}
                                                className="text-lg font-bold text-white tracking-wide bg-transparent border-b border-transparent hover:border-slate-700 focus:border-cyan-500 focus:outline-none transition-all w-40"
                                                placeholder="Nama Hunter..."
                                            />
                                            <IconUser />
                                        </div>
                                        <p className="text-xs text-cyan-400 font-mono mt-1">
                                            Rank saat ini: <span className="font-bold">{theme.name}</span>
                                        </p>
                                        <p className="text-xs text-slate-400 mt-0.5">
                                            Target: {targetWeight} kg (Sisa {Math.max(0, currentWeight - targetWeight).toFixed(1)} kg)
                                        </p>
                                    </div>
                                </div>

                                <div className="flex flex-col justify-center">
                                    <div className="flex justify-between items-end mb-1">
                                        <span className="text-xs font-hud text-slate-300">
                                            PROGRESS XP (SKILL LV {skillLevel})
                                        </span>
                                        <span className={`text-xs font-mono ${theme.text} font-bold`}>
                                            {xp} / {xpToNextLevel} XP
                                        </span>
                                    </div>
                                    <div className="w-full h-3 bg-slate-950 rounded-full overflow-hidden border border-slate-800 p-0.5">
                                        <div 
                                            className="h-full bg-gradient-to-r from-blue-600 via-cyan-500 to-teal-400 rounded-full transition-all duration-500"
                                            style={{ width: `${Math.min(100, (xp / xpToNextLevel) * 100)}%` }}
                                        ></div>
                                    </div>
                                    <p className="text-[10px] text-slate-500 mt-1 font-mono">
                                        *Sistem otomatis mengatur variasi dan beban latihan berdasarkan berat badan Anda!
                                    </p>
                                </div>

                                <div className="grid grid-cols-3 gap-2 text-center">
                                    <div className="p-2 rounded bg-slate-950/60 border border-slate-800">
                                        <p className="text-[10px] text-slate-500 font-mono">BERAT</p>
                                        <p className="text-base font-bold text-white font-mono">{currentWeight} <span className="text-[10px] text-slate-400">KG</span></p>
                                    </div>
                                    <div className="p-2 rounded bg-slate-950/60 border border-slate-800">
                                        <p className="text-[10px] text-slate-500 font-mono">PUSH UP</p>
                                        <p className="text-base font-bold text-white font-mono">{maxPushups} <span className="text-[10px] text-slate-400">RPS</span></p>
                                    </div>
                                    <div className="p-2 rounded bg-slate-950/60 border border-slate-800">
                                        <p className="text-[10px] text-slate-500 font-mono">PERUT</p>
                                        <p className="text-base font-bold text-white font-mono">{waistCircumference} <span className="text-[10px] text-slate-400">CM</span></p>
                                    </div>
                                </div>

                            </div>
                        </section>

                        {/* --- TABS (DESKTOP) --- */}
                        <div className="hidden sm:flex flex-wrap border-b border-slate-800 gap-1 mb-6 font-hud">
                            {[
                                { id: 'status', label: '📊 Status', icon: IconActivity },
                                { id: 'daily', label: '✅ Harian', icon: IconCheckCircle },
                                { id: 'workout', label: '⚔️ Dungeon Latihan', icon: IconDumbbell },
                                { id: 'food', label: '🍎 Nutrisi', icon: IconHeart },
                                { id: 'logs', label: '📈 Evaluasi', icon: IconTrendingDown },
                            ].map((tab) => {
                                const Icon = tab.icon;
                                const isActive = activeTab === tab.id;
                                return (
                                    <button
                                        key={tab.id}
                                        onClick={() => { playSound('click'); setActiveTab(tab.id); }}
                                        className={`flex items-center gap-2 px-4 py-3 text-xs sm:text-sm font-bold uppercase tracking-wider border-b-2 transition-all ${
                                            isActive 
                                                ? `border-cyan-500 ${theme.text} bg-slate-900/40 font-bold` 
                                                : 'border-transparent text-slate-400 hover:text-slate-200 hover:bg-slate-900/20'
                                        }`}
                                    >
                                        <Icon />
                                        <span>{tab.label}</span>
                                    </button>
                                );
                            })}
                        </div>

                        {/* --- TAB CONTENT --- */}
                        <div key={activeTab} className="space-y-6 animate-[tabFadeIn_0.35s_ease-out]">
                            
                            {/* STATUS WINDOW */}
                            {activeTab === 'status' && (
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    <div className="lg:col-span-2 space-y-6">

                                        {/* HUNTER ATTRIBUTE MATRIX: RADAR + TOTAL POWER */}
                                        <div className="p-6 rounded-xl border border-slate-800 bg-slate-900/50 relative overflow-hidden">
                                            <div className="flex items-center justify-between border-b border-slate-800 pb-2 mb-4">
                                                <h3 className={`text-sm font-bold tracking-widest uppercase font-hud ${theme.text}`}>
                                                    🛡️ HUNTER ATTRIBUTE MATRIX
                                                </h3>
                                                <span className="text-[10px] font-mono text-slate-400">
                                                    TOTAL POWER <strong className={`text-lg ml-1 ${theme.textGlow}`}>{stats.STR + stats.AGI + stats.END + stats.VIT + stats.DISC}</strong>
                                                </span>
                                            </div>
                                            {renderRadarChart()}
                                        </div>

                                        {/* GLOWING RPG STAT CARDS */}
                                        <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                            {[
                                                { key: 'STR', name: 'STR', full: 'Strength', val: stats.STR, color: 'from-red-600 to-orange-500', ring: 'border-red-500/40', txt: 'text-red-400', glow: 'shadow-[0_0_18px_rgba(239,68,68,0.35)]', icon: '💪', desc: 'Daya dorong push up.' },
                                                { key: 'AGI', name: 'AGI', full: 'Agility', val: stats.AGI, color: 'from-amber-500 to-yellow-400', ring: 'border-amber-500/40', txt: 'text-amber-400', glow: 'shadow-[0_0_18px_rgba(245,158,11,0.35)]', icon: '⚡', desc: 'Kecepatan bakar lemak.' },
                                                { key: 'END', name: 'END', full: 'Endurance', val: stats.END, color: 'from-green-600 to-emerald-500', ring: 'border-emerald-500/40', txt: 'text-emerald-400', glow: 'shadow-[0_0_18px_rgba(16,185,129,0.35)]', icon: '🫀', desc: 'Stamina EMOM/HIIT.' },
                                                { key: 'VIT', name: 'VIT', full: 'Vitality', val: stats.VIT, color: 'from-blue-600 to-cyan-500', ring: 'border-cyan-500/40', txt: 'text-cyan-400', glow: 'shadow-[0_0_18px_rgba(6,182,212,0.35)]', icon: '🔷', desc: 'Kualitas istirahat.' },
                                                { key: 'DISC', name: 'DISC', full: 'Discipline', val: stats.DISC, color: 'from-purple-600 to-pink-500', ring: 'border-purple-500/40', txt: 'text-purple-400', glow: 'shadow-[0_0_18px_rgba(168,85,247,0.35)]', icon: '🧠', desc: 'Konsistensi mental.' },
                                            ].map((attr) => {
                                                const lvl = Math.floor(attr.val / 20) + 1;
                                                return (
                                                    <div key={attr.key} className={`relative p-3 rounded-lg bg-slate-950/70 border ${attr.ring} ${attr.glow} overflow-hidden group hover:scale-[1.03] transition-transform`}>
                                                        {/* corner brackets */}
                                                        <div className={`absolute top-0 left-0 w-2.5 h-2.5 border-t-2 border-l-2 ${attr.ring}`}></div>
                                                        <div className={`absolute top-0 right-0 w-2.5 h-2.5 border-t-2 border-r-2 ${attr.ring}`}></div>
                                                        <div className={`absolute bottom-0 left-0 w-2.5 h-2.5 border-b-2 border-l-2 ${attr.ring}`}></div>
                                                        <div className={`absolute bottom-0 right-0 w-2.5 h-2.5 border-b-2 border-r-2 ${attr.ring}`}></div>
                                                        {/* sheen */}
                                                        <div className="absolute inset-0 bg-gradient-to-tr from-transparent via-white/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>

                                                        <div className="flex items-center justify-between mb-1">
                                                            <span className={`font-hud font-black text-sm tracking-wider ${attr.txt}`}>{attr.icon} {attr.name}</span>
                                                            <span className={`text-[9px] font-mono px-1.5 py-0.5 rounded bg-slate-900 border ${attr.ring} ${attr.txt}`}>Lv.{lvl}</span>
                                                        </div>
                                                        <p className="text-[9px] text-slate-500 font-mono mb-2 truncate">{attr.desc}</p>
                                                        <div className="flex items-end justify-between mb-1">
                                                            <span className="text-xl font-hud font-black text-white">{attr.val}</span>
                                                            <span className="text-[9px] text-slate-500 font-mono">/100</span>
                                                        </div>
                                                        <div className="w-full h-1.5 bg-slate-900 rounded-full overflow-hidden">
                                                            <div className={`h-full bg-gradient-to-r ${attr.color} transition-all duration-500`} style={{ width: `${Math.min(100, attr.val)}%` }}></div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>

                                        {/* DUNGEON DEADLINE COUNTDOWN */}
                                        {(() => {
                                            const midnight = new Date(now); midnight.setHours(24, 0, 0, 0);
                                            const msLeft = Math.max(0, midnight - now);
                                            const hh = String(Math.floor(msLeft / 3600000)).padStart(2, '0');
                                            const mm = String(Math.floor((msLeft % 3600000) / 60000)).padStart(2, '0');
                                            const ss = String(Math.floor((msLeft % 60000) / 1000)).padStart(2, '0');
                                            const totalDayMs = 24 * 3600000;
                                            const pct = Math.max(0, Math.min(100, (msLeft / totalDayMs) * 100));
                                            const urgency = workoutCompletedToday ? 'done' : (pct > 50 ? 'safe' : pct > 20 ? 'warn' : 'danger');
                                            const urgencyMap = {
                                                done: { bar: 'from-emerald-500 to-emerald-400', text: 'text-emerald-400', border: 'border-emerald-500/40' },
                                                safe: { bar: 'from-emerald-500 to-cyan-400', text: 'text-emerald-300', border: 'border-emerald-500/30' },
                                                warn: { bar: 'from-amber-500 to-yellow-400', text: 'text-amber-300', border: 'border-amber-500/40' },
                                                danger: { bar: 'from-red-600 to-orange-500', text: 'text-red-400', border: 'border-red-500/50' },
                                            };
                                            const u = urgencyMap[urgency];
                                            return (
                                                <div className={`p-5 rounded-xl border ${u.border} bg-slate-900/50 relative overflow-hidden`}>
                                                    <div className="flex items-center justify-between mb-2">
                                                        <h4 className="text-xs font-bold font-hud uppercase tracking-widest text-slate-300">⏳ Sisa Waktu Dungeon Hari Ini</h4>
                                                        {workoutCompletedToday && <span className="text-[10px] font-mono text-emerald-400 font-bold">✓ SELESAI</span>}
                                                    </div>
                                                    <div className={`text-3xl sm:text-4xl font-hud font-black tracking-widest ${u.text}`}>
                                                        {hh}:{mm}:{ss}
                                                    </div>
                                                    <div className="w-full h-2 bg-slate-950 rounded-full overflow-hidden mt-3 border border-slate-800">
                                                        <div className={`h-full bg-gradient-to-r ${u.bar} transition-all duration-1000`} style={{ width: `${pct}%` }}></div>
                                                    </div>
                                                    {!workoutCompletedToday && (
                                                        <button
                                                            onClick={() => { playSound('click'); setActiveTab('workout'); }}
                                                            className={`mt-4 w-full py-2.5 bg-gradient-to-r ${theme.grad} text-white font-hud font-bold text-xs uppercase tracking-widest rounded-lg ${theme.glow} active:scale-[0.98] transition-all`}
                                                        >
                                                            ⚔️ Mulai Dungeon Sekarang
                                                        </button>
                                                    )}
                                                    <p className="text-[10px] text-slate-500 font-mono mt-2 text-center">
                                                        Notifikasi pengingat otomatis pukul 18:00, 21:00, dan 23:00 jika belum selesai.
                                                    </p>
                                                </div>
                                            );
                                        })()}
                                    </div>

                                    <div className="space-y-6">
                                        <div className="p-6 rounded-xl border border-slate-800 bg-slate-900/50">
                                            <h3 className={`text-sm font-bold tracking-widest uppercase font-hud border-b border-slate-800 pb-2 mb-3 ${theme.text}`}>
                                                ⚖️ DYNAMIC WORKOUT STATUS
                                            </h3>
                                            <div className={`p-4 rounded-lg border text-xs leading-relaxed ${getRank().class}`}>
                                                <p className="font-bold font-hud uppercase mb-1">Dungeon Level: {getRank().rank}</p>
                                                <p className="text-slate-300">
                                                    Sistem mendeteksi berat badan Anda berada di angka <strong className="text-white">{currentWeight} kg</strong>. Menu latihan disesuaikan secara otomatis agar aman untuk sendi lutut namun tetap optimal membakar lemak!
                                                </p>
                                            </div>
                                        </div>

                                        <div className="p-6 rounded-xl border border-orange-950 bg-gradient-to-b from-slate-900 to-orange-950/20 relative overflow-hidden">
                                            <h4 className="text-xs font-bold font-hud text-orange-400 uppercase tracking-widest mb-1">
                                                🔓 HIDDEN QUEST: DISCIPLINE GATE
                                            </h4>
                                            <p className="text-[11px] text-slate-300 mb-3">
                                                Selesaikan latihan berturut-turut tanpa jeda bolos untuk klaim hadiah khusus!
                                            </p>
                                            <div className="flex justify-between p-2 rounded bg-slate-950/60 border border-orange-500/10 mb-3 text-xs font-mono text-orange-400">
                                                <span>Total Latihan:</span>
                                                <strong>{streak} Hari Aktif</strong>
                                            </div>
                                        </div>

                                        {/* ACHIEVEMENTS / TROPHY CASE */}
                                        <div className="p-6 rounded-xl border border-slate-800 bg-slate-900/50">
                                            <h4 className={`text-xs font-bold font-hud uppercase tracking-widest mb-3 flex items-center justify-between ${theme.text}`}>
                                                <span>🏆 TROPHY CASE</span>
                                                <span className="text-[10px] text-slate-500">{unlockedAchievements.length}/{ACHIEVEMENTS.length}</span>
                                            </h4>
                                            <div className="grid grid-cols-4 gap-2">
                                                {ACHIEVEMENTS.map(a => {
                                                    const unlocked = unlockedAchievements.includes(a.id);
                                                    return (
                                                        <div key={a.id} title={`${a.title} — ${a.desc}`}
                                                            className={`aspect-square rounded-lg flex items-center justify-center text-lg border transition-all ${
                                                                unlocked ? `${theme.border} ${theme.subBg} ${theme.glow}` : 'border-slate-800 bg-slate-950/60 grayscale opacity-30'
                                                            }`}>
                                                            {a.icon}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>

                                        {/* SKILL TREE */}
                                        <div className="p-6 rounded-xl border border-slate-800 bg-slate-900/50">
                                            <h4 className={`text-xs font-bold font-hud uppercase tracking-widest mb-3 ${theme.text}`}>
                                                🌳 SKILL TREE
                                            </h4>
                                            <div className="space-y-2">
                                                {SKILL_TREE.map(s => (
                                                    <div key={s.name} className={`flex items-center justify-between p-2.5 rounded border text-xs font-mono ${
                                                        s.unlocked ? `${theme.border} ${theme.subBg} text-white` : 'border-slate-850 bg-slate-950/40 text-slate-600'
                                                    }`}>
                                                        <span className="flex items-center gap-2">
                                                            <span>{s.unlocked ? s.icon : '🔒'}</span>
                                                            {s.name}
                                                        </span>
                                                        <span className={s.unlocked ? theme.text : ''}>Lv.{s.level}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* DAILY QUESTS */}
                            {activeTab === 'daily' && (
                                <div className="max-w-3xl mx-auto p-6 rounded-xl border border-slate-800 bg-slate-900/50 space-y-4">
                                    <div className="border-b border-slate-800 pb-3 flex items-center justify-between flex-wrap gap-2">
                                        <h3 className={`text-lg font-bold tracking-widest uppercase font-hud ${theme.text}`}>
                                            📅 MISI HARIAN (DAILY QUEST)
                                        </h3>
                                        <span className={`text-[10px] font-mono px-2 py-1 rounded border ${theme.border} ${theme.subBg} ${theme.text}`}>
                                            Disesuaikan untuk {dailyQuestConfig.label}
                                        </span>
                                    </div>

                                    <div className="space-y-3">
                                        {[
                                            { key: 'steps', ...dailyQuestConfig.steps, xp: `+${dailyQuestConfig.steps.xp} XP`, color: 'border-cyan-500/50', icon: IconFootprints },
                                            { key: 'sleep', ...dailyQuestConfig.sleep, xp: `+${dailyQuestConfig.sleep.xp} XP`, color: 'border-purple-500/50', icon: IconMoon },
                                        ].map((quest) => {
                                            const Icon = quest.icon;
                                            const isDone = dailyQuests[quest.key];
                                            return (
                                                <div 
                                                    key={quest.key}
                                                    onClick={() => handleDailyCheck(quest.key)}
                                                    className={`flex items-center justify-between p-4 rounded-lg border cursor-pointer transition-all ${
                                                        isDone ? 'bg-emerald-950/20 border-emerald-500 text-emerald-300 shadow-[0_0_15px_rgba(16,185,129,0.15)]' : 'bg-slate-950/60 border-slate-850 hover:border-slate-800'
                                                    }`}
                                                >
                                                    <div className="flex items-center gap-4">
                                                        <div className={`p-2.5 rounded ${isDone ? 'bg-emerald-500 text-slate-950' : 'bg-slate-900 text-slate-400'}`}>
                                                            <Icon />
                                                        </div>
                                                        <div>
                                                            <h4 className="text-sm font-bold font-hud">{quest.title} {isDone && "✓"}</h4>
                                                            <p className="text-xs text-slate-400 mt-0.5">{quest.desc}</p>
                                                        </div>
                                                    </div>
                                                    <span className="text-xs font-mono font-bold text-cyan-400">{quest.xp}</span>
                                                </div>
                                            );
                                        })}

                                        {/* QUICK WATER LOG WIDGET */}
                                        {(() => {
                                            const target = dailyQuestConfig.water.targetMl;
                                            const pct = Math.min(100, (waterMl / target) * 100);
                                            const isDone = dailyQuests.water;
                                            return (
                                                <div className={`p-4 rounded-lg border transition-all ${
                                                    isDone ? 'bg-emerald-950/20 border-emerald-500 text-emerald-300 shadow-[0_0_15px_rgba(16,185,129,0.15)]' : 'bg-slate-950/60 border-blue-500/50'
                                                }`}>
                                                    <div className="flex items-center gap-4 mb-3">
                                                        <div className={`p-2.5 rounded ${isDone ? 'bg-emerald-500 text-slate-950' : 'bg-slate-900 text-blue-400'}`}>
                                                            <IconDroplet />
                                                        </div>
                                                        <div className="flex-1">
                                                            <h4 className="text-sm font-bold font-hud">{dailyQuestConfig.water.title} {isDone && "✓"}</h4>
                                                            <p className="text-xs text-slate-400 mt-0.5">{dailyQuestConfig.water.desc}</p>
                                                        </div>
                                                        <span className="text-xs font-mono font-bold text-cyan-400">+{dailyQuestConfig.water.xp} XP</span>
                                                    </div>
                                                    <div className="flex items-center justify-between text-[11px] font-mono text-slate-400 mb-1">

                                                    </div>

                                                        <div className="h-full bg-gradient-to-r from-blue-500 to-cyan-400 transition-all duration-500" style={{ width: `${pct}%` }}></div>
                                                    </div>

                                                            { label: '+250ml', amt: 250 },
                                                            { label: '+500ml', amt: 500 },

                                                            <button key={btn.amt} onClick={() => handleAddWater(btn.amt)}
                                                                className="flex-1 py-2 rounded border border-blue-700/40 bg-blue-950/30 text-blue-300 text-[11px] font-bold hover:bg-blue-900/40 active:scale-95 transition-all">
                                                                💧 {btn.label}
                                                            </button>
                                                        ))}

                                                            className="px-3 py-2 rounded border border-slate-700 bg-slate-900 text-slate-400 text-[11px] font-bold hover:border-slate-600 active:scale-95 transition-all">

                                                        </button>
                                                    </div>
                                                </div>

                                        <div className="flex gap-3">
                                            <div className="text-red-500 mt-0.5"><IconAlertTriangle /></div>
                                            <div>
                                                <h4 className="text-xs font-bold font-hud text-red-400 uppercase">PENALTI KEDISIPLINAN SISTEM</h4>
                                                <p className="text-xs text-slate-300 mt-1 leading-relaxed">
                                                    Jika Anda membatalkan atau tidak melakukan latihan terjadwal hari ini tanpa alasan darurat medis yang rasional, Anda wajib menerapkan penalti di bawah ini.
                                                </p>
                                                <button
                                                    disabled={workoutPenaltyClaimed}
                                                    onClick={handlePenalty}
                                                    className="mt-3 px-4 py-2 bg-red-950/60 border border-red-500 hover:bg-red-900 text-red-400 font-mono text-xs font-bold rounded tracking-wider uppercase transition-colors"
                                                >
                                                    {workoutPenaltyClaimed ? "PENALTI DI-TERAPKAN (-20 XP)" : "Gagal Latihan: Terapkan Penalti"}
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* WORKOUT DUNGEON */}
                            {activeTab === 'workout' && (
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    <div className="space-y-3">
                                        <h3 className="text-xs font-bold tracking-widest text-slate-400 uppercase font-hud px-1">
                                            🗝️ PILIH HARI LATIHAN
                                        </h3>
                                        {[1, 2, 3, 4, 5].map((dayNum) => {
                                            const dayData = workouts[dayNum];
                                            const isSelected = selectedDay === dayNum;
                                            return (
                                                <button
                                                    key={dayNum}
                                                    disabled={autoDungeonActive}
                                                    onClick={() => { playSound('click'); setSelectedDay(dayNum); }}

                                                        isSelected 
                                                            ? `bg-gradient-to-r from-blue-950 to-slate-900 border-blue-500 ${theme.glow}` 
                                                            : 'bg-slate-900/40 border-slate-800 hover:border-slate-700'
                                                    } ${autoDungeonActive ? 'opacity-50 cursor-not-allowed' : ''}`}

                                                    <div className="flex justify-between items-center mb-1 text-xs">
                                                        <span className={`px-2 py-0.5 rounded font-bold font-hud ${isSelected ? 'bg-blue-500 text-slate-950' : 'bg-slate-800 text-slate-400'}`}>
                                                            DAY {dayNum}
                                                        </span>
                                                        <span className="font-mono text-slate-400">+{dayData.xp} XP</span>
                                                    </div>
                                                    <h4 className="text-xs font-bold text-white font-hud tracking-wide mt-1">
                                                        {dayData.title.split(' — ')[1]}
                                                    </h4>
                                                </button>
                                            );
                                        })}

                                            <div className="absolute inset-0 bg-slate-950/95 z-30 flex flex-col items-center justify-center p-6 text-center animate-fade-in rounded-xl">

                                                        <div className="text-emerald-400 flex justify-center mb-2"><IconCheckCircle /></div>

                                                        <button 
                                                            onClick={stopAutoDungeon}
                                                            className={`mt-4 px-6 py-2 rounded bg-gradient-to-r ${theme.grad} text-white font-hud text-xs font-bold tracking-widest`}
                                                        >
                                                            KEMBALI KE LOBI
                                                        </button>
                                                    </div>
                                                ) : (
                                                    <div className="w-full max-w-sm space-y-6">
                                                        <div>
                                                            <span className="text-[10px] font-mono tracking-widest text-cyan-400 uppercase bg-blue-950/40 px-3 py-1 rounded border border-blue-800/40">
                                                                {autoDungeonPhase === 'finisher'
                                                                    ? 'CARDIO FINISHER (SEKALI JALAN)'
                                                                    : `AUTO MODE RUNNING (RONDE ${autoRound} / ${workouts[selectedDay].rounds})`}

                                                                🔆 LAYAR TETAP MENYALA
                                                            </span>
                                                            <h3 className="text-xl font-bold font-hud text-white mt-4 uppercase">
                                                                {(() => {
                                                                    if (autoDungeonPhase === 'finisher') {
                                                                        const finisherList = workouts[selectedDay].exercises.filter(ex => ex.once);
                                                                        return finisherList[autoFinisherIndex]?.name || '';
                                                                    }
                                                                    if (autoDungeonPhase === 'exercise') {
                                                                        const mainList = workouts[selectedDay].exercises.filter(ex => !ex.once);
                                                                        return mainList[autoExIndex]?.name || '';
                                                                    }
                                                                    return 'ISTIRAHAT SEJENAK';
                                                                })()}

                                                            <p className="text-xs text-slate-400 font-mono mt-1">
                                                                {(() => {
                                                                    if (autoDungeonPhase === 'finisher') {
                                                                        const finisherList = workouts[selectedDay].exercises.filter(ex => ex.once);
                                                                        return `Aksi gerakan: ${finisherList[autoFinisherIndex]?.reps || ''}`;
                                                                    }
                                                                    if (autoDungeonPhase === 'exercise') {
                                                                        const mainList = workouts[selectedDay].exercises.filter(ex => !ex.once);
                                                                        return `Aksi gerakan: ${mainList[autoExIndex]?.reps || ''}`;
                                                                    }
                                                                    return 'Ambil napas dalam-dalam';
                                                                })()}
                                                            </p>
                                                        </div>

                                                        <div className={`w-32 h-32 rounded-full border-4 ${(autoDungeonPhase === 'exercise' || autoDungeonPhase === 'finisher') ? 'border-cyan-500' : 'border-orange-500'} flex items-center justify-center mx-auto shadow-[0_0_20px_rgba(6,182,212,0.3)]`}>
                                                            <span className="text-5xl font-hud font-bold text-white font-mono">{autoTimerCount}s</span>
                                                        </div>

                                                        {/* Exercise sequence list indicator */}
                                                        <div className="space-y-1 text-left bg-slate-900/60 p-3 rounded border border-slate-800 max-h-32 overflow-y-auto no-scrollbar">

                                                                <div key={idx} className={`text-[11px] font-mono flex justify-between ${workoutChecks[`day-${selectedDay}-ex-${idx}`] ? 'text-emerald-400' : 'text-slate-500'}`}>
                                                                    <span>{idx + 1}. {ex.name}{ex.once ? ' (sekali jalan)' : ''}</span>
                                                                    <span>{ex.duration}s</span>
                                                                </div>
                                                            ))}
                                                        </div>

                                                        <button 
                                                            onClick={stopAutoDungeon}
                                                            className="text-xs text-red-400 font-mono underline hover:text-red-300"
                                                        >
                                                            BATALKAN AUTO DUNGEON
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                            </div>
                                            <span className="px-3 py-1 bg-blue-950 border border-blue-500/40 text-blue-400 text-xs font-mono font-bold rounded">

                                            </span>
                                        </div>

                                        <div className="space-y-2">
                                            <div className="flex justify-between items-center mb-1">

                                                <button 
                                                    onClick={startAutoDungeon}

                                                    🤖 MASUK JALUR AUTO-MODE
                                                </button>
                                            </div>
                                            {workouts[selectedDay].exercises.map((ex, idx) => {

                                                const isChecked = !!workoutChecks[checkKey];
                                                return (
                                                    <div 
                                                        key={idx}
                                                        onClick={() => handleExerciseCheck(idx)}
                                                        className={`flex items-center justify-between p-3 rounded-lg border cursor-pointer transition-all ${

                                                        <div className="flex items-center gap-3 text-xs">
                                                            <div className={`w-4 h-4 rounded border flex items-center justify-center ${isChecked ? 'bg-emerald-500 border-emerald-500 text-slate-950' : 'border-slate-700'}`}>
                                                                {isChecked && <IconCheckCircle />}
                                                            </div>
                                                            <div>
                                                                <span className="font-bold text-white block">{ex.name}</span>
                                                                <span className="text-slate-400 mt-0.5 block">Dosis: {ex.reps} ({ex.duration} detik)</span>
                                                            </div>
                                                        </div>
                                                        <span className="text-[10px] font-mono text-slate-500">#{idx+1}</span>
                                                    </div>
                                                );
                                            })}
                                        </div>

                                        <div className="mt-8 p-4 rounded-lg bg-slate-950/80 border border-slate-800 flex flex-col sm:flex-row justify-between items-center gap-4">
                                            <div className="flex items-center gap-3">
                                                <div className="text-blue-400"><IconClock /></div>
                                                <div>
                                                    <p className="text-xs font-bold font-hud text-white">RECOVERY COUNTDOWN</p>
                                                    <p className="text-[10px] text-slate-400">Rekomendasi jeda antar-ronde: {workouts[selectedDay].restEx}s (Gerakan), {workouts[selectedDay].restRound}s (Ronde)</p>
                                                </div>
                                            </div>

                                            <div className="flex items-center gap-3">
                                                <div className="text-xl font-bold font-hud text-cyan-400 w-12 text-center">{timerCount}s</div>
                                                <button
                                                    onClick={() => { playSound('click'); setTimerActive(!timerActive); }}
                                                    className={`px-4 py-1.5 font-hud text-xs font-bold rounded uppercase transition-colors ${timerActive ? 'bg-orange-600 text-slate-950' : 'bg-blue-600 text-white'}`}
                                                >
                                                    {timerActive ? 'PAUSE' : 'MULAI RECOVERY'}
                                                </button>
                                                <button
                                                    onClick={() => { playSound('click'); setTimerActive(false); setTimerCount(60); }}
                                                    className="p-1.5 text-slate-400 hover:text-white rounded bg-slate-900 text-xs"
                                                >
                                                    RESET
                                                </button>
                                            </div>
                                        </div>

                                        <div className="mt-8 pt-6 border-t border-slate-800 text-center">
                                            {workoutCompletedToday ? (
                                                <div className="p-4 rounded-lg bg-emerald-950/20 border border-emerald-500/30 text-emerald-400 font-hud text-xs">
                                                    🎉 QUEST BERHASIL DI-KLAIM UNTUK HARI INI! SILAKAN LANJUTKAN BESOK.
                                                </div>
                                            ) : (
                                                <button
                                                    onClick={completeActiveWorkout}
                                                    className={`px-8 py-3 bg-gradient-to-r ${theme.grad} hover:opacity-90 text-white font-hud font-bold tracking-widest text-xs uppercase rounded-lg ${theme.glow} hover:scale-[1.01] active:scale-[0.99] transition-all`}
                                                >
                                                    ⚔️ SELESAIKAN DUNGEON & KLAIM XP (+{workouts[selectedDay].xp} XP)
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* FOOD QUEST */}
                            {activeTab === 'food' && (
                                <div className="space-y-6">
                                    <div className="p-6 rounded-xl border border-slate-800 bg-slate-900/50">
                                        <div className="border-b border-slate-800 pb-3 mb-6 flex flex-col sm:flex-row justify-between items-center gap-2">
                                            <h3 className={`text-sm font-bold tracking-widest uppercase font-hud ${theme.text}`}>
                                                🍱 SISTEM PENATAAN NUTRISI (LOW-BUDGET INDONESIA)
                                            </h3>
                                            <span className="px-3 py-1 rounded bg-slate-950 border border-slate-800 text-xs font-mono text-cyan-400 font-bold">
                                                Estimasi Target: {nutrition.cal} Kcal/hari
                                            </span>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 text-xs">
                                            {nutrition.meals.map((meal, idx) => {
                                                const colors = ['text-amber-400 bg-amber-950/40', 'text-green-400 bg-green-950/40', 'text-blue-400 bg-blue-950/40', 'text-purple-400 bg-purple-950/40'];
                                                return (
                                                    <div key={idx} className="p-4 rounded-lg bg-slate-950/60 border border-slate-800 relative">
                                                        <span className={`absolute top-2 right-2 text-[10px] font-mono uppercase px-1.5 py-0.5 rounded ${colors[idx % colors.length]}`}>
                                                            {meal.time}
                                                        </span>
                                                        <h4 className="font-bold text-slate-100 font-hud mb-2 uppercase tracking-wide">
                                                            Porsi {meal.time}
                                                        </h4>
                                                        <p className="text-slate-300 leading-relaxed text-[11px] pt-1">
                                                            {meal.menu}
                                                        </p>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                        <div className="mt-4 p-3 bg-slate-950/80 rounded border border-slate-800 text-[11px] font-mono text-slate-400 text-center">
                                            *Menu makanan beradaptasi secara otomatis untuk mencukupi defisit kalori harian Anda berdasarkan berat dan aktivitas harian.
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* EVALUATION & RIWAYAT LOGS */}
                            {activeTab === 'logs' && (
                                <div className="space-y-6">

                                    {/* BOSS BATTLE: WEEKLY PROGRESS FRAMED AS BOSS FIGHT */}
                                    <div className={`p-6 rounded-xl border ${bossDefeated ? 'border-emerald-500/50' : 'border-red-900/50'} bg-gradient-to-b from-slate-900 to-red-950/10 relative overflow-hidden`}>
                                        <div className="flex items-center justify-between mb-2 flex-wrap gap-2">
                                            <h3 className="text-sm font-bold tracking-widest uppercase font-hud text-red-400">
                                                👹 BOSS BATTLE: LORD OF EXCESS WEIGHT
                                            </h3>
                                            <span className="text-[10px] font-mono text-slate-400">
                                                {bossDefeated ? 'BOSS DIKALAHKAN!' : `HP TERSISA ${bossHpRemainingPct.toFixed(0)}%`}
                                            </span>
                                        </div>
                                        <div className="w-full h-4 bg-slate-950 rounded-full overflow-hidden border border-red-900/40">
                                            <div className={`h-full transition-all duration-700 ${bossDefeated ? 'bg-gradient-to-r from-emerald-500 to-cyan-400' : 'bg-gradient-to-r from-red-700 to-red-500'}`}
                                                style={{ width: `${bossHpRemainingPct}%` }}></div>
                                        </div>
                                        <p className="text-[11px] text-slate-400 mt-2">
                                            {bossDefeated
                                                ? 'Selamat Hunter! Boss telah dikalahkan — target berat badan tercapai.'
                                                : `Setiap kg yang turun memberi damage ke boss. Damage tersalur: ${bossDamageDealt.toFixed(1)} / ${bossTotalHp.toFixed(1)} kg.`}
                                        </p>
                                    </div>

                                    {/* BODY SILHOUETTE DIAGRAM WITH MEASUREMENTS */}
                                    <div className="p-6 rounded-xl border border-slate-800 bg-slate-900/50">
                                        <h3 className={`text-sm font-bold tracking-widest uppercase font-hud border-b border-slate-800 pb-2 mb-4 ${theme.text}`}>
                                            🧍 PETA UKURAN TUBUH HUNTER
                                        </h3>
                                        <div className="flex flex-col sm:flex-row items-center gap-6">
                                            <svg viewBox="0 0 200 340" className="w-40 sm:w-48 flex-shrink-0">
                                                {/* Simple humanoid silhouette */}
                                                <circle cx="100" cy="40" r="26" fill="#1e293b" stroke={theme.fill} strokeWidth="2" />
                                                <path d="M70 70 Q100 60 130 70 L140 150 Q100 165 60 150 Z" fill="#1e293b" stroke={theme.fill} strokeWidth="2" />
                                                <path d="M70 75 L35 140 M130 75 L165 140" stroke={theme.fill} strokeWidth="10" strokeLinecap="round" fill="none" />
                                                <path d="M75 150 L65 300 M125 150 L135 300" stroke={theme.fill} strokeWidth="14" strokeLinecap="round" fill="none" />
                                                {/* measurement callout lines */}
                                                <line x1="140" y1="150" x2="185" y2="150" stroke="#475569" strokeDasharray="3,3" />
                                                <line x1="165" y1="105" x2="195" y2="105" stroke="#475569" strokeDasharray="3,3" />
                                            </svg>
                                            <div className="flex-1 w-full space-y-2 text-xs font-mono">
                                                <div className="flex justify-between p-2.5 rounded bg-slate-950/60 border border-slate-800">
                                                    <span className="text-slate-400">⚖️ Berat Badan</span>
                                                    <strong className="text-white">{currentWeight} kg</strong>
                                                </div>
                                                <div className="flex justify-between p-2.5 rounded bg-slate-950/60 border border-slate-800">
                                                    <span className="text-slate-400">📏 Lingkar Perut</span>
                                                    <strong className="text-white">{waistCircumference} cm</strong>
                                                </div>
                                                <div className="flex justify-between p-2.5 rounded bg-slate-950/60 border border-slate-800">
                                                    <span className="text-slate-400">💪 Lingkar Lengan</span>
                                                    <strong className="text-white">{logs[0]?.arm != null ? `${logs[0].arm} cm` : '— belum diisi'}</strong>
                                                </div>
                                                <div className="flex justify-between p-2.5 rounded bg-slate-950/60 border border-slate-800">
                                                    <span className="text-slate-400">🧘 Plank Terlama</span>
                                                    <strong className="text-white">{Math.max(0, ...logs.map(l => l.plank || 0))}s</strong>
                                                </div>
                                                <div className="flex justify-between p-2.5 rounded bg-slate-950/60 border border-slate-800">
                                                    <span className="text-slate-400">🦵 Max Squat</span>
                                                    <strong className="text-white">{Math.max(0, ...logs.map(l => l.squat || 0))}x</strong>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    <div className="p-6 rounded-xl border border-slate-800 bg-slate-900/50 h-fit">
                                        <h3 className={`text-sm font-bold tracking-widest uppercase font-hud border-b border-slate-800 pb-2 mb-4 ${theme.text}`}>
                                            📝 EVALUASI KONDISI FISIK
                                        </h3>
                                        <form onSubmit={handleWeeklyLogSubmit} className="space-y-4 text-xs font-mono">
                                            <div>
                                                <label className="block text-slate-400 mb-1">Berat Badan Saat Ini (kg):</label>

                                                    type="number" step="0.1" value={inputWeight}

                                                    className="w-full p-2 rounded bg-slate-950 border border-slate-800 focus:border-cyan-500 focus:outline-none text-white text-sm"
                                                    required
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-slate-400 mb-1">Maksimum Push Up (reps):</label>
                                                <input 
                                                    type="number" value={inputPushups}
                                                    onChange={(e) => setInputPushups(e.target.value)}
                                                    placeholder="Contoh: 7" 
                                                    className="w-full p-2 rounded bg-slate-950 border border-slate-800 focus:border-cyan-500 focus:outline-none text-white text-sm"
                                                    required
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-slate-400 mb-1">Lingkar Perut (cm):</label>
                                                <input 
                                                    type="number" value={inputWaist}
                                                    onChange={(e) => setInputWaist(e.target.value)}

                                                    className="w-full p-2 rounded bg-slate-950 border border-slate-800 focus:border-cyan-500 focus:outline-none text-white text-sm"
                                                    required
                                                />
                                            </div>
                                            <div className="pt-2 border-t border-slate-800/70">
                                                <p className="text-[10px] text-slate-500 uppercase tracking-widest mb-2">Metrik Tambahan (Opsional)</p>
                                            </div>
                                            <div>
                                                <label className="block text-slate-400 mb-1">Lingkar Lengan (cm):</label>
                                                <input 
                                                    type="number" step="0.1" value={inputArm}

                                                    className="w-full p-2 rounded bg-slate-950 border border-slate-800 focus:border-cyan-500 focus:outline-none text-white text-sm"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-slate-400 mb-1">Waktu Tahan Plank (detik):</label>
                                                <input 
                                                    type="number" value={inputPlank}
                                                    onChange={(e) => setInputPlank(e.target.value)}
                                                    placeholder="Contoh: 45" 
                                                    className="w-full p-2 rounded bg-slate-950 border border-slate-800 focus:border-cyan-500 focus:outline-none text-white text-sm"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-slate-400 mb-1">Maksimum Squat (reps):</label>
                                                <input 
                                                    type="number" value={inputSquat}
                                                    onChange={(e) => setInputSquat(e.target.value)}
                                                    placeholder="Contoh: 20" 
                                                    className="w-full p-2 rounded bg-slate-950 border border-slate-800 focus:border-cyan-500 focus:outline-none text-white text-sm"
                                                />
                                            </div>
                                            <button
                                                type="submit"
                                                className={`w-full py-2.5 bg-gradient-to-r ${theme.grad} text-white font-hud font-bold uppercase rounded tracking-wider text-xs transition-colors`}
                                            >
                                                KIRIM DATA KE SISTEM
                                            </button>
                                        </form>
                                    </div>

                                    <div className="lg:col-span-2 p-6 rounded-xl border border-slate-800 bg-slate-900/50">
                                        <h3 className={`text-sm font-bold tracking-widest uppercase font-hud border-b border-slate-800 pb-2 mb-4 ${theme.text}`}>
                                            📈 ARSIP EVALUASI MINGGUAN
                                        </h3>
                                        
                                        {/* Grafik Perkembangan */}
                                        <div className="mb-6">
                                            {renderChart()}
                                        </div>

                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left text-xs font-mono">
                                                <thead>
                                                    <tr className="border-b border-slate-800 text-slate-500">
                                                        <th className="py-2 px-3">Waktu Input</th>
                                                        <th className="py-2 px-3">Berat Badan</th>
                                                        <th className="py-2 px-3">Push Up Max</th>
                                                        <th className="py-2 px-3">Lingkar Perut</th>
                                                        <th className="py-2 px-3">Lengan</th>
                                                        <th className="py-2 px-3">Plank</th>
                                                        <th className="py-2 px-3">Squat</th>
                                                        <th className="py-2 px-3 text-right">Target Sisa</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-900 text-slate-300">
                                                    {logs.map((log, index) => {
                                                        const diff = (log.weight - targetWeight).toFixed(1);
                                                        return (
                                                            <tr key={index} className="hover:bg-slate-950/40">
                                                                <td className="py-3 px-3 text-white font-bold">{log.date}</td>
                                                                <td className="py-3 px-3">{log.weight} kg</td>
                                                                <td className="py-3 px-3">{log.pushups} reps</td>
                                                                <td className="py-3 px-3">{log.waist} cm</td>
                                                                <td className="py-3 px-3">{log.arm != null ? `${log.arm} cm` : '—'}</td>
                                                                <td className="py-3 px-3">{log.plank != null ? `${log.plank}s` : '—'}</td>
                                                                <td className="py-3 px-3">{log.squat != null ? `${log.squat}x` : '—'}</td>
                                                                <td className={`py-3 px-3 text-right font-bold ${parseFloat(diff) <= 0 ? 'text-green-400' : 'text-cyan-400'}`}>
                                                                    {parseFloat(diff) <= 0 ? 'GOAL ACHIEVED!' : `+${diff} kg`}
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                                </div>
                            )}

                        </div>

                    </main>

                    {/* --- BOTTOM NAV (MOBILE, THUMB-FRIENDLY) --- */}
                    <nav className={`sm:hidden fixed bottom-0 left-0 right-0 z-40 border-t ${theme.border} bg-slate-950/95 backdrop-blur-md flex justify-around items-stretch pb-[env(safe-area-inset-bottom)]`}>
                        {[
                            { id: 'status', label: 'HUD', icon: IconActivity },
                            { id: 'daily', label: 'Harian', icon: IconCheckCircle },
                            { id: 'workout', label: 'Dungeon', icon: IconDumbbell },
                            { id: 'food', label: 'Nutrisi', icon: IconHeart },
                            { id: 'logs', label: 'Evaluasi', icon: IconTrendingDown },
                        ].map((tab) => {
                            const Icon = tab.icon;
                            const isActive = activeTab === tab.id;
                            return (
                                <button
                                    key={tab.id}
                                    onClick={() => { playSound('click'); setActiveTab(tab.id); }}
                                    className={`flex-1 flex flex-col items-center justify-center gap-0.5 py-2.5 min-w-[56px] transition-all active:scale-95 ${
                                        isActive ? theme.text : 'text-slate-500'
                                    }`}
                                >
                                    <div className={`transition-transform ${isActive ? 'scale-110' : ''}`}><Icon /></div>
                                    <span className={`text-[9px] font-hud uppercase tracking-wide ${isActive ? 'font-bold' : ''}`}>{tab.label}</span>
                                    {isActive && <span className={`w-4 h-0.5 rounded-full mt-0.5 ${theme.bg}`}></span>}
                                </button>
                            );
                        })}
                    </nav>

                    <footer className="mt-16 border-t border-slate-900 bg-slate-950 py-6 text-center text-xs text-slate-500">
                        <p className="font-hud uppercase tracking-widest">"SYSTEM SAYS: GET STRONGER EVERY SINGLE DAY."</p>
                    </footer>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- --- PWA: DYNAMIC MANIFEST + SERVICE WORKER + INSTALL PROMPT (single-file friendly) --- -->
    <script>
        (function () {
            // Simple SVG icon (Solo Leveling shield glyph) encoded as data URI, used for manifest + apple touch icon
            const iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="28" fill="#020617"/><path d="M96 24 156 52v44c0 44-26 72-60 88-34-16-60-44-60-88V52z" fill="none" stroke="#22d3ee" stroke-width="8"/><text x="96" y="112" font-size="64" font-family="Arial" font-weight="900" fill="#22d3ee" text-anchor="middle">SL</text></svg>`;
            const iconDataUri = 'data:image/svg+xml;base64,' + btoa(iconSvg);

            // Build manifest and attach as blob URL
            const manifest = {
                name: 'Solo Leveling Fitness HUD',
                short_name: 'SL Fitness',
                description: 'Fitness tracker RPG bergaya Solo Leveling',
                start_url: window.location.href,
                display: 'standalone',
                background_color: '#020617',
                theme_color: '#020617',
                icons: [
                    { src: iconDataUri, sizes: '192x192', type: 'image/svg+xml' },
                    { src: iconDataUri, sizes: '512x512', type: 'image/svg+xml' }
                ]
            };
            const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
            const manifestUrl = URL.createObjectURL(manifestBlob);
            const manifestLink = document.getElementById('pwa-manifest-link');
            if (manifestLink) manifestLink.setAttribute('href', manifestUrl);

            // Apple touch icon (iOS doesn't read manifest icons)
            const appleIcon = document.createElement('link');
            appleIcon.rel = 'apple-touch-icon';
            appleIcon.href = iconDataUri;
            document.head.appendChild(appleIcon);

            // Minimal offline-caching service worker, registered from a Blob URL
            if ('serviceWorker' in navigator) {
                const swCode = `
                    const CACHE_NAME = 'sl-fitness-cache-v1';
                    self.addEventListener('install', (e) => {
                        self.skipWaiting();
                        e.waitUntil(caches.open(CACHE_NAME).then((cache) => cache.addAll([self.registration.scope])).catch(() => {}));
                    });
                    self.addEventListener('activate', (e) => self.clients.claim());
                    self.addEventListener('fetch', (e) => {
                        e.respondWith(
                            caches.match(e.request).then((cached) => {
                                const fetchPromise = fetch(e.request).then((res) => {
                                    if (res && res.status === 200 && e.request.method === 'GET') {
                                        const resClone = res.clone();
                                        caches.open(CACHE_NAME).then((cache) => cache.put(e.request, resClone));
                                    }
                                    return res;
                                }).catch(() => cached);
                                return cached || fetchPromise;
                            })
                        );
                    });
                `;
                const swBlob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(swBlob);
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register(swUrl).catch((err) => console.warn('SW registration failed:', err));
                });
            }

            // Capture install prompt for the "Install App" button inside Settings
            window.__slDeferredInstallPrompt = null;
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                window.__slDeferredInstallPrompt = e;
                window.dispatchEvent(new CustomEvent('sl-installable'));
            });
        })();
    </script>
</body>
